name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1

  dependency-review:
    name: Dependency Review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  dependency-policy:
    name: Dependency Policy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Bun deps & node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Enforce dependency license policy
        run: bun run check:licenses

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [workflow-lint, dependency-policy]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Bun deps & node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: [workflow-lint, dependency-policy]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Bun deps & node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type check
        run: bun run typecheck

  unused:
    name: Unused Code Check
    runs-on: ubuntu-latest
    needs: [workflow-lint, dependency-policy]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Bun deps & node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unused code check
        run: bun run check:unused

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unused]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Bun deps & node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Upload Next build
        uses: actions/upload-artifact@v5
        with:
          name: next-build
          path: .next
          retention-days: 7

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [workflow-lint, dependency-policy]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Bun deps & node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests with coverage
        run: bun run test:unit:coverage

      - name: Upload unit test coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: unit-test-coverage
          path: .artifacts/coverage
          if-no-files-found: ignore
          retention-days: 7

  e2e-chromium:
    name: E2E Chromium
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Bun deps & node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Next build artifact
        uses: actions/download-artifact@v5
        with:
          name: next-build
          path: .next

      - name: Install Playwright browsers and system dependencies
        run: bunx playwright install --with-deps

      - name: Run Playwright E2E tests (Chromium)
        id: playwright_chromium
        run: bun run test:e2e -- --project=chromium

      - name: Upload Playwright artifacts (Chromium)
        if: ${{ always() && steps.playwright_chromium.outcome == 'failure' }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-chromium
          path: |
            .artifacts/playwright-report
            .artifacts/playwright-test-results
          if-no-files-found: ignore
          retention-days: 7

  e2e-mobile:
    name: E2E Mobile Chrome
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Bun deps & node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Next build artifact
        uses: actions/download-artifact@v5
        with:
          name: next-build
          path: .next

      - name: Install Playwright browsers and system dependencies
        run: bunx playwright install --with-deps

      - name: Run Playwright E2E tests (Mobile Chrome)
        id: playwright_mobile
        run: bun run test:e2e -- --project=mobile-chrome

      - name: Upload Playwright artifacts (Mobile Chrome)
        if: ${{ always() && steps.playwright_mobile.outcome == 'failure' }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-mobile-chrome
          path: |
            .artifacts/playwright-report
            .artifacts/playwright-test-results
          if-no-files-found: ignore
          retention-days: 7
