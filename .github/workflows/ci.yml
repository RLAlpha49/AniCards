name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow Lint
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1

  dependency-review:
    name: Dependency Review
    if: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  dependency-policy:
    name: Dependency Policy
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Enforce dependency license policy
        run: bun run check:licenses

  lint:
    name: Lint
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Run lint
        run: bun run lint:check

  typecheck:
    name: Type Check
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Run type check
        run: bun run typecheck

  unused:
    name: Unused Code Check
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Run unused code check
        run: bun run check:unused

  build:
    name: Build
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-cache-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('app/**', 'components/**', 'lib/**', 'public/**', 'package.json', 'tsconfig.json', 'next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-cache-${{ hashFiles('**/bun.lock') }}-

      - name: Build project
        run: bun run build

      - name: Upload Next build
        uses: actions/upload-artifact@v5
        with:
          name: next-build
          path: .next
          retention-days: 7

  unit-tests:
    name: Unit Tests
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Run unit tests with coverage
        run: bun run test:unit:coverage

      - name: Upload unit test coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: unit-test-coverage
          path: .artifacts/coverage
          if-no-files-found: ignore
          retention-days: 7

  e2e-chromium:
    name: E2E Chromium
    timeout-minutes: 25
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          VERSION=$(node -p "const version = require('./package.json').devDependencies['@playwright/test']; if (!version) throw new Error('Missing @playwright/test devDependency'); version.replace(/^[^0-9]*/, '')")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Download Next build artifact
        uses: actions/download-artifact@v5
        with:
          name: next-build
          path: .next

      - name: Install Playwright browsers and system dependencies
        run: bunx playwright install --with-deps

      - name: Run Playwright E2E tests (Chromium)
        id: playwright_chromium
        run: bun run test:e2e -- --project=chromium

      - name: Upload Playwright artifacts (Chromium)
        if: ${{ always() && steps.playwright_chromium.outcome == 'failure' }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-chromium
          path: |
            .artifacts/playwright-report
            .artifacts/playwright-test-results
          if-no-files-found: ignore
          retention-days: 7

  e2e-mobile:
    name: E2E Mobile Chrome
    timeout-minutes: 25
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          VERSION=$(node -p "const version = require('./package.json').devDependencies['@playwright/test']; if (!version) throw new Error('Missing @playwright/test devDependency'); version.replace(/^[^0-9]*/, '')")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Download Next build artifact
        uses: actions/download-artifact@v5
        with:
          name: next-build
          path: .next

      - name: Install Playwright browsers and system dependencies
        run: bunx playwright install --with-deps

      - name: Run Playwright E2E tests (Mobile Chrome)
        id: playwright_mobile
        run: bun run test:e2e -- --project=mobile-chrome

      - name: Upload Playwright artifacts (Mobile Chrome)
        if: ${{ always() && steps.playwright_mobile.outcome == 'failure' }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-mobile-chrome
          path: |
            .artifacts/playwright-report
            .artifacts/playwright-test-results
          if-no-files-found: ignore
          retention-days: 7
