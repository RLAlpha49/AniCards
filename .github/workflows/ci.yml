name: CI

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow Lint
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1

  dependency-review:
    name: Dependency Review
    if: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  dependency-policy:
    name: Dependency Policy
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Enforce dependency license policy
        run: bun run check:licenses

  lint:
    name: Lint
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Run lint
        run: bun run lint:check

  typecheck:
    name: Type Check
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Run type check
        run: bun run typecheck

  unused:
    name: Unused Code Check
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Run unused code check
        run: bun run check:unused

  build:
    name: Build
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Validate production env contract
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: https://anicards.alpha49.com
          UPSTASH_REDIS_REST_URL: https://example.upstash.io
          UPSTASH_REDIS_REST_TOKEN: ci-placeholder-upstash-token
          CRON_SECRET: ci-placeholder-cron-secret
          API_SECRET_TOKEN: ci-placeholder-request-proof-secret
        run: |
          bun --eval '
            const { assertRequiredProductionEnv } = await import("./lib/api/production-env.ts");
            assertRequiredProductionEnv();
            console.log("[INFO] Production env contract is valid.");
          '

      - name: Cache Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-cache-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('app/**', 'components/**', 'lib/**', 'public/**', 'package.json', 'tsconfig.json', 'next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-cache-${{ hashFiles('**/bun.lock') }}-

      - name: Build project
        run: bun run build

      - name: Upload Next build
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          path: .next
          include-hidden-files: true
          retention-days: 7

  unit-tests:
    name: Unit Tests
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Run unit tests with coverage
        run: bun run test:unit:coverage

      - name: Enforce unit test line coverage threshold
        env:
          COVERAGE_LINES_THRESHOLD: "73"
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const reportPath = ".artifacts/coverage/lcov.info";
          const threshold = Number(process.env.COVERAGE_LINES_THRESHOLD ?? "73");

          if (!Number.isFinite(threshold)) {
            console.error(`Invalid COVERAGE_LINES_THRESHOLD: ${process.env.COVERAGE_LINES_THRESHOLD ?? ""}`);
            process.exit(1);
          }

          if (!fs.existsSync(reportPath)) {
            console.error(`Coverage report not found at ${reportPath}`);
            process.exit(1);
          }

          let linesFound = 0;
          let linesHit = 0;

          for (const line of fs.readFileSync(reportPath, "utf8").split(/\r?\n/)) {
            if (line.startsWith("LF:")) {
              linesFound += Number(line.slice(3));
            } else if (line.startsWith("LH:")) {
              linesHit += Number(line.slice(3));
            }
          }

          if (linesFound === 0) {
            console.error("LCOV report did not include any executable lines.");
            process.exit(1);
          }

          const lineCoverage = (linesHit / linesFound) * 100;
          console.log(
            `Line coverage: ${lineCoverage.toFixed(2)}% (${linesHit}/${linesFound}); threshold: ${threshold.toFixed(2)}%`
          );

          if (lineCoverage < threshold) {
            console.error(
              `Coverage threshold not met: ${lineCoverage.toFixed(2)}% < ${threshold.toFixed(2)}%`
            );
            process.exit(1);
          }
          NODE

      - name: Upload unit test coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-coverage
          path: .artifacts/coverage
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7

  e2e-chromium:
    name: E2E Chromium
    timeout-minutes: 25
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          VERSION=$(node -p "const version = require('./package.json').devDependencies['@playwright/test']; if (!version) throw new Error('Missing @playwright/test devDependency'); version.replace(/^[^0-9]*/, '')")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Download Next build artifact
        uses: actions/download-artifact@v8
        with:
          name: next-build
          path: .next

      - name: Install Playwright browsers and system dependencies
        run: bunx playwright install --with-deps

      - name: Run Playwright E2E tests (Chromium)
        id: playwright_chromium
        run: bun run test:e2e -- --project=chromium

      - name: Upload Playwright artifacts (Chromium)
        if: ${{ always() && steps.playwright_chromium.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-chromium
          path: |
            .artifacts/playwright-report
            .artifacts/playwright-test-results
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7

  e2e-mobile:
    name: E2E Mobile Chrome
    timeout-minutes: 25
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      actions: read
      contents: read

    steps:
