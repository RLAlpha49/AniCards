name: Check for Package Updates
on:
  workflow_dispatch:
    inputs:
      update-packages:
        description: "Automatically update package.json (creates PR)"
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: read

concurrency:
  group: dependency-updates
  cancel-in-progress: false

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      PR_BRANCH: deps/update-packages
      GH_TOKEN: ${{ secrets.PULL_REQUEST_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PULL_REQUEST_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Cache Bun deps & node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for semver-bounded package updates
        id: check-updates
        run: |
          NCU_OUTPUT=$(bunx npm-check-updates --target minor)
          UPDATE_INFO=$(bunx npm-check-updates --target minor --jsonUpgraded)

          echo "## 📦 Package Updates Available" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -n "$NCU_OUTPUT" ]; then
            echo "$NCU_OUTPUT" >> $GITHUB_STEP_SUMMARY
          else
            echo "No patch/minor dependency updates found." >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Update policy: patch/minor releases only." >> $GITHUB_STEP_SUMMARY

          echo "update_info<<EOF" >> $GITHUB_OUTPUT
          echo "$UPDATE_INFO" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          UPDATE_COUNT=$(echo "$UPDATE_INFO" | jq 'length')
          if [ "$UPDATE_COUNT" -gt 0 ]; then
            echo "[INFO] Found $UPDATE_COUNT package updates available"
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "[INFO] No package updates found"
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare update branch
        id: prepare-branch
        if: ${{ steps.check-updates.outputs.has_updates == 'true' && ((github.event_name == 'workflow_dispatch' && inputs.update-packages == true) || github.event_name != 'workflow_dispatch') }}
        run: |
          git fetch origin main "$PR_BRANCH" || true

          if git ls-remote --exit-code --heads origin "$PR_BRANCH" > /dev/null 2>&1; then
            echo "[INFO] Reusing existing update branch: $PR_BRANCH"
            git checkout -B "$PR_BRANCH" "origin/$PR_BRANCH"
          else
            echo "[INFO] Creating update branch from origin/main: $PR_BRANCH"
            git checkout -B "$PR_BRANCH" origin/main
          fi

          echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT

      - name: Update dependencies and validate before commit
        id: validate-update
        if: ${{ steps.check-updates.outputs.has_updates == 'true' && ((github.event_name == 'workflow_dispatch' && inputs.update-packages == true) || github.event_name != 'workflow_dispatch') }}
        run: |
          bunx npm-check-updates -u --target minor
          bun install

          bun run lint:check
          bun run typecheck
          bun run test:unit
          bun run build
          bun run check:licenses

          git add package.json bun.lock
          if git diff --cached --quiet; then
            echo "[INFO] No package.json or bun.lock changes remain after validation"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push validated dependency updates
        id: push-updates
        if: ${{ steps.validate-update.outputs.has_changes == 'true' }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git commit -m "chore: update dependencies"
          git push -u origin "$PR_BRANCH"

      - name: Create or update dependency PR
        if: ${{ steps.push-updates.outcome == 'success' }}
        env:
          UPDATE_INFO: ${{ steps.check-updates.outputs.update_info }}
        run: |
          PR_NUMBER=$(gh pr list --head "$PR_BRANCH" --json number --jq '.[0].number')
          COMMENT_FILE=$(mktemp)

          cat > "$COMMENT_FILE" << EOF
          ## 📦 Dependency Updates

          This branch was regenerated after passing lockfile refresh and validation.

          <details>
          <summary>Updated packages</summary>

          \`\`\`json
          $UPDATE_INFO
          \`\`\`
          </details>
          EOF

          if [ -n "$PR_NUMBER" ]; then
            echo "[INFO] Commenting on existing dependency PR #$PR_NUMBER"
            gh pr comment "$PR_NUMBER" --body-file "$COMMENT_FILE"
          else
            echo "[INFO] Creating dependency PR from branch $PR_BRANCH"
            gh pr create \
              --title "chore: update dependencies" \
              --body-file "$COMMENT_FILE" \
              --base main \
              --head "$PR_BRANCH"
          fi

          rm -f "$COMMENT_FILE"
