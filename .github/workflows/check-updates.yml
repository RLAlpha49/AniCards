name: Check for Package Updates
on:
  workflow_dispatch:
    inputs:
      update-packages:
        description: "Automatically update package.json (creates PR)"
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: read

concurrency:
  group: dependency-updates
  cancel-in-progress: false

jobs:
  check-updates:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      PR_BRANCH: deps/update-packages

    steps:
      - name: Require PULL_REQUEST_TOKEN for downstream workflow enforcement
        env:
          PULL_REQUEST_TOKEN: ${{ secrets.PULL_REQUEST_TOKEN }}
        run: |
          if [ -z "$PULL_REQUEST_TOKEN" ]; then
            echo "::error::PULL_REQUEST_TOKEN is required for dependency update branch and PR automation because GITHUB_TOKEN-originated pushes can suppress downstream CI and security workflows."
            exit 1
          fi

          printf '%s\n' "Dependency updater will use PULL_REQUEST_TOKEN so downstream push and pull_request workflows can run normally." >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PULL_REQUEST_TOKEN }}
          persist-credentials: false

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Determine update automation mode
        id: automation-mode
        run: |
          should_apply=true
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.update-packages }}" != "true" ]; then
            should_apply=false
          fi

          printf '%s\n' "should_apply=$should_apply" >> "$GITHUB_OUTPUT"

      - name: Check for semver-bounded package updates
        id: check-updates
        run: |
          NCU_OUTPUT=$(bun run update:check || true)
          UPDATE_INFO=$(bun run update:check:json || true)

          if [ -z "$UPDATE_INFO" ]; then
            UPDATE_INFO='{}'
          fi

          {
            printf '%s\n' "## 📦 Package Updates Available"
            printf '%s\n' '```'
            if [ -n "$NCU_OUTPUT" ]; then
              printf '%s\n' "$NCU_OUTPUT"
            else
              printf '%s\n' "No patch/minor dependency updates found."
            fi
            printf '%s\n' '```'
            printf '%s\n' "Update policy: patch/minor releases only."
          } >> "$GITHUB_STEP_SUMMARY"

          {
            printf '%s\n' "update_info<<EOF"
            printf '%s\n' "$UPDATE_INFO"
            printf '%s\n' "EOF"
          } >> "$GITHUB_OUTPUT"

          UPDATE_COUNT=$(echo "$UPDATE_INFO" | jq 'length')
          if [ "$UPDATE_COUNT" -gt 0 ]; then
            echo "[INFO] Found $UPDATE_COUNT package updates available"
            printf '%s\n' "has_manifest_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "[INFO] No package updates found"
            printf '%s\n' "has_manifest_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare update branch
        id: prepare-branch
        if: ${{ steps.automation-mode.outputs.should_apply == 'true' }}
        env:
          PULL_REQUEST_TOKEN: ${{ secrets.PULL_REQUEST_TOKEN }}
        run: |
          remote_url="https://x-access-token:${PULL_REQUEST_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          public_remote="https://github.com/${GITHUB_REPOSITORY}.git"

          git remote set-url origin "$remote_url"
          trap 'git remote set-url origin "$public_remote"' EXIT

          git fetch origin main "$PR_BRANCH" || true

          if git ls-remote --exit-code --heads origin "$PR_BRANCH" > /dev/null 2>&1; then
            echo "[INFO] Reusing existing update branch: $PR_BRANCH"
            git checkout -B "$PR_BRANCH" "origin/$PR_BRANCH"
          else
            echo "[INFO] Creating update branch from origin/main: $PR_BRANCH"
            git checkout -B "$PR_BRANCH" origin/main
          fi

          printf '%s\n' "pr_branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Refresh dependencies and validate before commit
        id: validate-update
        if: ${{ steps.automation-mode.outputs.should_apply == 'true' }}
        env:
          HAS_MANIFEST_UPDATES: ${{ steps.check-updates.outputs.has_manifest_updates }}
        run: |
          set -euo pipefail

          if [ "$HAS_MANIFEST_UPDATES" = "true" ]; then
            bun run update:apply
          fi

          bun install

          manifest_changed=false
          lockfile_changed=false

          if ! git diff --quiet -- package.json; then
            manifest_changed=true
          fi

          if ! git diff --quiet -- bun.lock; then
            lockfile_changed=true
          fi

          if [ "$manifest_changed" = "false" ] && [ "$lockfile_changed" = "false" ]; then
            echo "[INFO] No package.json or bun.lock changes remain after refresh"
            {
              printf '%s\n' "has_changes=false"
              printf '%s\n' "change_kind=none"
            } >> "$GITHUB_OUTPUT"

            printf '%s\n' "No direct dependency or lockfile refresh changes were needed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$manifest_changed" = "true" ] && [ "$lockfile_changed" = "true" ]; then
            change_kind=manifest-and-lockfile
            change_summary="Direct dependency updates plus a refreshed bun.lock."
          elif [ "$manifest_changed" = "true" ]; then
            change_kind=manifest-only
            change_summary="Direct dependency updates changed package.json."
          else
            change_kind=lockfile-only
            change_summary="No direct package.json bumps were needed; bun.lock was refreshed under existing ranges."
          fi

          printf '%s\n' "$change_summary" >> "$GITHUB_STEP_SUMMARY"

          bun run lint:check
          bun run typecheck
          bun run test:unit
          bun run build
          bun run check:licenses

          git add package.json bun.lock
          if git diff --cached --quiet; then
            echo "[INFO] No package.json or bun.lock changes remain after validation"
            {
              printf '%s\n' "has_changes=false"
              printf '%s\n' "change_kind=none"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            printf '%s\n' "has_changes=true"
            printf '%s\n' "change_kind=$change_kind"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and push validated dependency updates
        id: push-updates
        if: ${{ steps.validate-update.outputs.has_changes == 'true' }}
        env:
          PULL_REQUEST_TOKEN: ${{ secrets.PULL_REQUEST_TOKEN }}
        run: |
          remote_url="https://x-access-token:${PULL_REQUEST_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          public_remote="https://github.com/${GITHUB_REPOSITORY}.git"

          git remote set-url origin "$remote_url"
          trap 'git remote set-url origin "$public_remote"' EXIT

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git commit -m "chore: update dependencies"
          git push -u origin "$PR_BRANCH"

      - name: Create or update dependency PR
        if: ${{ steps.push-updates.outcome == 'success' }}
        env:
          CHANGE_KIND: ${{ steps.validate-update.outputs.change_kind }}
          GH_TOKEN: ${{ secrets.PULL_REQUEST_TOKEN }}
          UPDATE_INFO: ${{ steps.check-updates.outputs.update_info }}
        run: |
          PR_NUMBER=$(gh pr list --head "$PR_BRANCH" --json number --jq '.[0].number')
          COMMENT_FILE=$(mktemp)

          {
            printf '%s\n' '## 📦 Dependency Updates'
            printf '%s\n' ''
            printf '%s\n' 'This branch was regenerated after passing dependency refresh and validation.'
            printf '%s\n' ''
            printf '%s\n' "Change kind: \\`$CHANGE_KIND\\`."
            printf '%s\n' ''
            printf '%s\n' '<details>'
            printf '%s\n' '<summary>Direct package.json updates</summary>'
            printf '%s\n' ''
            if [ "$UPDATE_INFO" = '{}' ]; then
              printf '%s\n' 'No direct package.json semver bumps were needed for this refresh.'
            else
              printf '%s\n' '```json'
              printf '%s\n' "$UPDATE_INFO"
              printf '%s\n' '```'
            fi
            printf '%s\n' '</details>'
          } > "$COMMENT_FILE"

          if [ -n "$PR_NUMBER" ]; then
            echo "[INFO] Commenting on existing dependency PR #$PR_NUMBER"
            gh pr comment "$PR_NUMBER" --body-file "$COMMENT_FILE"
          else
            echo "[INFO] Creating dependency PR from branch $PR_BRANCH"
            gh pr create \
              --title "chore: update dependencies" \
              --body-file "$COMMENT_FILE" \
              --base main \
              --head "$PR_BRANCH"
          fi

          rm -f "$COMMENT_FILE"
