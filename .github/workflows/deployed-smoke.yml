name: Deployed Vercel Smoke

on:
  deployment_status:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.deployment.ref || github.event.deployment.environment || github.event.deployment.sha || github.run_id }}
  cancel-in-progress: true

jobs:
  deployed-smoke:
    if: ${{ github.event.deployment_status.state == 'success' }}
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          VERSION=$(node -p "const version = require('./package.json').devDependencies['@playwright/test']; if (!version) throw new Error('Missing @playwright/test devDependency'); version.replace(/^[^0-9]*/, '')")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Install Playwright browsers and system dependencies
        run: bunx playwright install --with-deps

      - name: Resolve deployed AniCards URL
        env:
          DEPLOYMENT_URL: ${{ github.event.deployment_status.environment_url }}
          TARGET_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          node <<'NODE'
          const { appendFileSync } = require("node:fs");

          const trustedPreviewHostPattern = /^anicards(?:-[a-z0-9-]+)+\.vercel\.app$/;
          const rawCandidate =
            (process.env.DEPLOYMENT_URL || process.env.TARGET_URL || "").trim();

          if (!rawCandidate) {
            throw new Error(
              "deployment_status is missing both environment_url and target_url.",
            );
          }

          let parsedUrl;
          try {
            parsedUrl = new URL(rawCandidate);
          } catch {
            throw new Error(
              `Deployment URL must be a valid absolute http(s) URL: ${rawCandidate}`,
            );
          }

          if (!/^https?:$/.test(parsedUrl.protocol)) {
            throw new Error(`Deployment URL must use http(s): ${rawCandidate}`);
          }

          if (parsedUrl.username || parsedUrl.password) {
            throw new Error(
              "Deployment URL must not include embedded credentials.",
            );
          }

          const normalizedHost = parsedUrl.hostname.toLowerCase();
          const isTrustedPreviewHost = trustedPreviewHostPattern.test(
            normalizedHost,
          );
          const isTrustedProductionHost =
            normalizedHost === "anicards.alpha49.com";

          if (!isTrustedPreviewHost && !isTrustedProductionHost) {
            throw new Error(`Refusing unexpected deployment host: ${normalizedHost}`);
          }

          appendFileSync(
            process.env.GITHUB_ENV,
            `PLAYWRIGHT_BASE_URL=${parsedUrl.origin}\n`,
          );
          appendFileSync(
            process.env.GITHUB_ENV,
            `PLAYWRIGHT_CAN_SEND_BYPASS=${isTrustedPreviewHost ? "1" : "0"}\n`,
          );

          console.log(`[INFO] Using deployed smoke URL: ${parsedUrl.origin}`);
          console.log(
            `[INFO] ${
              isTrustedPreviewHost
                ? "Trusted AniCards preview host detected; bypass headers may be used if configured."
                : "Public AniCards host detected; bypass headers disabled."
            }`,
          );
          NODE

      - name: Wait for deployed Vercel URL
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail

          curl_headers=()
          if [[ "${PLAYWRIGHT_CAN_SEND_BYPASS:-}" == "1" && -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]]; then
            curl_headers=(
              -H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}"
              -H "x-vercel-set-bypass-cookie: true"
            )
          fi

          for attempt in {1..5}; do
            if curl --fail --silent --show-error "${curl_headers[@]}" "$PLAYWRIGHT_BASE_URL" > /dev/null; then
              echo "[INFO] Deployed target is reachable: $PLAYWRIGHT_BASE_URL"
              exit 0
            fi

            echo "[INFO] Waiting for deployed target ($attempt/5): $PLAYWRIGHT_BASE_URL"
            sleep 15
          done

          if [[ "${PLAYWRIGHT_CAN_SEND_BYPASS:-}" == "1" && -z "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]]; then
            echo "[ERROR] Timed out waiting for deployed target. If this preview is protected, configure VERCEL_AUTOMATION_BYPASS_SECRET in GitHub secrets to bypass Vercel deployment protection."
          fi

          echo "[ERROR] Timed out waiting for deployed target: $PLAYWRIGHT_BASE_URL"
          exit 1

      - name: Run deployed smoke tests (Chromium)
        id: playwright_deployed
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: bun run test:e2e:deployed-smoke

      - name: Upload Playwright artifacts (Deployed Smoke)
        if: ${{ always() && steps.playwright_deployed.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-deployed-smoke
          path: |
            .artifacts/playwright-report
            .artifacts/playwright-test-results
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7
