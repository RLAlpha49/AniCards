name: Security Audits

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1" # Weekly baseline audit.
    - cron: "0 3 * * 4" # Midweek follow-up to reduce quiet-time exposure.

permissions:
  contents: read

concurrency:
  group: ${{ format('{0}-{1}', github.workflow, github.event_name == 'schedule' && format('schedule-{0}', github.run_id) || github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

jobs:
  codeql-analysis:
    name: CodeQL Analysis
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [typescript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  bun-audit:
    name: Bun Audit & SBOM
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Generate CycloneDX SBOM
        run: bun run generate:sbom

      - name: Run bun audit
        run: bun audit

      - name: Upload CycloneDX SBOM
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: cyclonedx-sbom
          path: .artifacts/sbom
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 14
