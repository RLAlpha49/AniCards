  /api/store-users:
    post:
      operationId: "storeUser"
      tags:
        - "store"
      summary: "Store or update a user's AniCards record"
      description: >-
        Persists a versioned split user record, atomically flips the active
        commit pointer, maintains the normalized username alias and stale-user
        refresh index, and optionally enforces optimistic concurrency via
        `ifMatchUpdatedAt`. This is a browser-only mutation route: in
        production it requires same-origin requests, a verified client IP, the
        shared request-proof cookie, and a short-lived per-user protected write
        grant minted by `/api/anilist` `GetUserStats` or `/api/get-user` for
        the same user. The server only persists the bound AniList snapshot for
        that subject and does not treat the client-supplied username as
        authoritative. Public reads later return a bounded DTO that excludes
        request metadata such as redacted IP buckets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
