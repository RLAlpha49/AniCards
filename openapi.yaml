  /api/cron/analytics-reporting:
    get:
      operationId: "listAnalyticsReports"
      tags:
        - "cron"
      summary: "List recent persisted analytics reports"
      description: >-
        Returns recent stored analytics reports from the bounded
        `analytics:reports` Redis list. Reports are returned newest first. The
        `limit` query is capped by the server-side retention policy. The list
        currently retains at most 50 generated reports.
      parameters:
        - $ref: "#/components/parameters/CronSecretHeader"
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: >-
            Maximum number of recent reports to return. Values above the
            retention cap are clamped to the configured maximum.
      security:
        - CronSecret: []
        - CronBearer: []
      responses:
        "200":
          description: "Recent analytics reports, newest first"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsReportList"
              examples:
                reports:
                  value:
                    reports:
                      - summary:
                          visits: 250
                        raw_data:
                          analytics:visits: 250
                        generatedAt: "2026-03-22T10:30:00.000Z"
                      - summary:
                          visits: 100
                        raw_data:
                          analytics:visits: 100
                        generatedAt: "2026-03-21T10:30:00.000Z"
                    count: 2
                    retentionLimit: 50
        "400":
          description: "Invalid list query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidLimit:
                  value:
                    error: "Invalid limit parameter"
                    category: "invalid_data"
                    retryable: false
                    status: 400
                    recoverySuggestions: []
        "401":
          $ref: "#/components/responses/CronUnauthorizedJson"
        "500":
          description: "Unexpected analytics report read failure"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                failure:
                  value:
                    error: "Failed to fetch analytics reports"
                    category: "server_error"
                    retryable: true
                    status: 500
                    recoverySuggestions: []
        "503":
          $ref: "#/components/responses/CronServiceUnavailableJson"
    post:
      operationId: "generateAnalyticsReport"
      tags:
        - "cron"
      summary: "Generate and persist an analytics report"
      description: >-
        Collects all `analytics:*` Redis keys except `analytics:reports`, groups
        them into a nested summary object, appends the latest report to the
        bounded `analytics:reports` Redis list, and returns it. Runtime analytics
        collection in the web app is consent-gated; this endpoint only reads the
        already-persisted aggregate counters and reports.
      parameters:
        - $ref: "#/components/parameters/CronSecretHeader"
      security:
        - CronSecret: []
        - CronBearer: []
      responses:
        "200":
          description: "Generated analytics report"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsReport"
              examples:
                report:
                  value:
                    summary:
                      visits: 100
                      anilist_api:
                        successful_requests: 200
                    raw_data:
                      analytics:visits: 100
                      analytics:anilist_api:successful_requests: 200
                    generatedAt: "2026-03-21T10:30:00.000Z"
        "401":
          $ref: "#/components/responses/CronUnauthorizedJson"
        "500":
          description: "Unexpected analytics job failure"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                failure:
                  value:
                    error: "Analytics and reporting job failed"
                    category: "server_error"
                    retryable: true
                    status: 500
                    recoverySuggestions: []
        "503":
          $ref: "#/components/responses/CronServiceUnavailableJson"

components:
  securitySchemes:
    CronSecret:
      type: apiKey
      in: header
      name: x-cron-secret
      description: >-
        Shared cron secret header for operator-facing cron endpoints. Local and
        manual callers can send `x-cron-secret`. Deployed environments fail
        with `503` when `CRON_SECRET` is missing; unsecured cron is available
        only through the explicit development override.
    CronBearer:
      type: http
      scheme: bearer
      bearerFormat: "CRON_SECRET"
      description: >-
        Hosted schedulers such as Vercel may send `Authorization: Bearer
        <CRON_SECRET>` instead of `x-cron-secret`.

  parameters:
    CronSecretHeader:
      in: header
      name: x-cron-secret
      required: false
      schema:
        type: string
      description: >-
        Cron secret used to protect operator-only endpoints. When the server is
        missing `CRON_SECRET`, the route fails with `503` instead of allowing
        unauthenticated access, except in the explicit development override.
        Hosted schedulers may alternatively use `Authorization: Bearer
        <CRON_SECRET>`.

    CardUserId:
      in: query
      name: userId
      required: false
      schema:
        type: integer
        minimum: 1
      description: >-
        Numeric AniList user ID. Either `userId` or `username` is required.
        When both are present, `userId` is used.

    CardUsername:
      in: query
      name: username
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 100
      description: >-
        Canonical AniList username lookup key. The route trims and
        case-normalizes it through the stored username index when `userId` is
        omitted.

    CardUserNameDeprecated:
      in: query
      name: userName
      required: false
      deprecated: true
      schema:
        type: string
        minLength: 1
        maxLength: 100
      description: >-
        Deprecated alias for `username`. Kept only for backward compatibility
        with older stat card links; new clients should use `username`.

    CardType:
      in: query
      name: cardType
      required: true
      schema:
        $ref: "#/components/schemas/CardType"
      description: "Card identifier to render"

    CardVariation:
      in: query
      name: variation
      required: false
      schema:
        $ref: "#/components/schemas/CardVariation"
      description: >-
        Optional card variation. Unsupported combinations fall back to the
        card-type default on the server.

    CardAnimate:
      in: query
      name: animate
      required: false
      schema:
        oneOf:
          - type: boolean
          - type: string
            enum:
              - "0"
              - "1"
              - "false"
              - "true"
              - "no"
              - "yes"
              - "off"
              - "on"
      description: >-
        Animation toggle. SVG routes keep animations enabled unless the value
        is one of `0`, `false`, `no`, or `off` (case-insensitive after
        trimming). `/card.png` injects `animate=false` when this parameter is
        omitted before rasterizing the card.

    CardColorPreset:
      in: query
      name: colorPreset
      required: false
      schema:
        $ref: "#/components/schemas/CardColorPreset"
      description: >-
        Runtime color preset key. Named presets apply first, then individual
        URL core-color overrides can replace specific slots. The special value
        `custom` means “use saved custom colors” unless all four core URL
        colors (`titleColor`, `backgroundColor`, `textColor`, and
        `circleColor`) are present, in which case the URL colors are used
        directly.

    CardTitleColor:
      in: query
      name: titleColor
      required: false
      schema:
        type: string
      description: >-
        Title color override. URL-encode `#` as `%23` when sending hex colors.

    CardBackgroundColor:
      in: query
      name: backgroundColor
      required: false
      schema:
        type: string
      description: "Background color override"

    CardTextColor:
      in: query
      name: textColor
      required: false
      schema:
        type: string
      description: "Body text color override"

    CardCircleColor:
      in: query
      name: circleColor
      required: false
      schema:
        type: string
      description: "Accent circle color override"

    CardBorderColor:
      in: query
      name: borderColor
      required: false
      schema:
        type: string
      description: "Border color override"

    CardBorderRadius:
      in: query
      name: borderRadius
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 100
      description: >-
        Border radius override in pixels. The route clamps values into the range
        0-100.

    CardShowFavorites:
      in: query
      name: showFavorites
      required: false
      schema:
        type: boolean
      description: >-
        Enables favourite-marking visuals on the card types that support them.

    CardStatusColors:
      in: query
      name: statusColors
      required: false
      schema:
        type: boolean
      description: "Use fixed status colors on status-distribution cards"

    CardPiePercentages:
      in: query
      name: piePercentages
      required: false
      schema:
        type: boolean
      description: >-
        Show percentage labels on pie and donut variants that support them.

    CardGridCols:
      in: query
      name: gridCols
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 5
      description: "Favorites grid column count"

    CardGridRows:
      in: query
      name: gridRows
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 5
      description: "Favorites grid row count"

    CardCacheBust:
      in: query
      name: _t
      required: false
      schema:
        type: string
      description: >-
        Opaque manual refresh token. Any value bypasses card-render cache reads
        and returns no-store headers for that response. It does not trigger a
        fresh AniList sync on its own.

  headers:
    CardBorderRadius:
      description: "Effective border radius used when rendering the card"
      schema:
        type: string
    CardCacheSource:
      description: >-
        Successful card render cache source indicator. Values currently include
        `render`, `memory`, `redis`, and `refresh`.
      schema:
        type: string
    CardCacheControl:
      description: >-
        Browser cache policy for card responses. Successful canonical renders
        use `public, max-age=86400, stale-while-revalidate=604800,
        stale-if-error=1209600`; successful explicit variant requests use
        `public, max-age=3600, stale-while-revalidate=86400,
        stale-if-error=604800`; `_t` renders and error responses use
        `no-store, max-age=0, must-revalidate`.
      schema:
        type: string
      example: "public, max-age=86400, stale-while-revalidate=604800, stale-if-error=1209600"
    CardSharedCacheControl:
      description: >-
        Shared-cache policy exposed via `CDN-Cache-Control` and
        `Edge-Cache-Control`. Successful canonical renders use
        `public, s-maxage=86400, stale-while-revalidate=604800,
        stale-if-error=1209600`; successful explicit variant requests use
        `public, s-maxage=3600, stale-while-revalidate=86400,
        stale-if-error=604800`; `_t` renders and error responses use
        `no-store`.
      schema:
        type: string
      example: "public, s-maxage=86400, stale-while-revalidate=604800, stale-if-error=1209600"
    RetryAfter:
      description: "Seconds until the client should retry the request"
      schema:
        type: string
    RateLimitLimit:
      description: "Configured request limit for the current window"
      schema:
        type: string
    RateLimitRemaining:
      description: "Remaining requests in the current rate-limit window"
      schema:
        type: string
    RateLimitReset:
      description: "Unix timestamp in milliseconds when the current rate-limit window resets"
      schema:
        type: string
    AccessControlAllowOriginJsonApi:
      description: >-
        Allowed browser origin for JSON API requests. In production this comes
        from `NEXT_PUBLIC_APP_URL`; in development it falls back to the request
        origin or `*`.
      schema:
        type: string
      example: "https://anicards.alpha49.com"
    AccessControlAllowOriginCardSvg:
      description: >-
        Allowed embed origin for card SVG responses. In production this defaults
        to `https://anilist.co` unless `NEXT_PUBLIC_CARD_SVG_ALLOWED_ORIGIN`
        overrides it.
      schema:
        type: string
      example: "https://anilist.co"
    AccessControlAllowHeadersContentType:
      description: "Allowed request headers for this endpoint"
      schema:
        type: string
      example: "Content-Type"
    AccessControlAllowHeadersContentTypeRequestId:
      description: "Allowed request headers for this endpoint"
      schema:
        type: string
      example: "Content-Type, X-Request-Id"
    AccessControlAllowMethodsGetHeadOptions:
      description: "Allowed HTTP methods for this endpoint"
      schema:
        type: string
      example: "GET, HEAD, OPTIONS"
    AccessControlAllowMethodsPostOptions:
      description: "Allowed HTTP methods for this endpoint"
      schema:
        type: string
      example: "POST, OPTIONS"
    AccessControlExposeHeadersJsonApi:
      description: "Response headers exposed to JSON API browser clients"
      schema:
        type: string
      example: "Retry-After, X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset, X-Request-Id"
    AccessControlExposeHeadersCardSvg:
      description: "Response headers exposed to SVG card browser clients"
      schema:
        type: string
      example: "X-Card-Border-Radius, Retry-After, X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset, X-Request-Id"
    HeaderVaryOrigin:
      description: "Response varies by request `Origin`."
      schema:
        type: string
      example: "Origin"
    RequestId:
      description: "Per-request correlation ID generated by the API layer"
      schema:
        type: string
      example: "req_01HZQK8F8Y6Z8A2R3M4N5P6Q7R"

  responses:
    UnauthorizedJson:
      description: "Request blocked by same-origin protection"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            unauthorized:
              value:
                error: "Unauthorized"
                category: "authentication"
                retryable: false
                status: 401
                recoverySuggestions: []

    TooManyRequestsJson:
      description: "Rate limit exceeded"
      headers:
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
        X-RateLimit-Limit:
          $ref: "#/components/headers/RateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/RateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/RateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            rateLimited:
              value:
                error: "Too many requests"
                category: "rate_limited"
                retryable: true
                status: 429
                recoverySuggestions:
                  - title: "Wait and retry"
                    description: "Please wait a minute before generating another card. We're limiting requests to keep the service running smoothly."

    JsonGetPreflight:
      description: "CORS preflight response for JSON read endpoints"
      headers:
        Access-Control-Allow-Origin:
          $ref: "#/components/headers/AccessControlAllowOriginJsonApi"
        Access-Control-Allow-Headers:
          $ref: "#/components/headers/AccessControlAllowHeadersContentType"
        Access-Control-Allow-Methods:
          $ref: "#/components/headers/AccessControlAllowMethodsGetHeadOptions"
        Access-Control-Expose-Headers:
          $ref: "#/components/headers/AccessControlExposeHeadersJsonApi"
        Vary:
          $ref: "#/components/headers/HeaderVaryOrigin"
        X-Request-Id:
          $ref: "#/components/headers/RequestId"

    JsonPostPreflight:
      description: "CORS preflight response for JSON write endpoints"
      headers:
        Access-Control-Allow-Origin:
          $ref: "#/components/headers/AccessControlAllowOriginJsonApi"
        Access-Control-Allow-Headers:
          $ref: "#/components/headers/AccessControlAllowHeadersContentType"
        Access-Control-Allow-Methods:
          $ref: "#/components/headers/AccessControlAllowMethodsPostOptions"
        Access-Control-Expose-Headers:
          $ref: "#/components/headers/AccessControlExposeHeadersJsonApi"
        Vary:
          $ref: "#/components/headers/HeaderVaryOrigin"
        X-Request-Id:
          $ref: "#/components/headers/RequestId"

    ErrorReportsPreflight:
      description: "CORS preflight response for structured error-report ingestion"
      headers:
        Access-Control-Allow-Origin:
          $ref: "#/components/headers/AccessControlAllowOriginJsonApi"
        Access-Control-Allow-Headers:
          $ref: "#/components/headers/AccessControlAllowHeadersContentTypeRequestId"
        Access-Control-Allow-Methods:
          $ref: "#/components/headers/AccessControlAllowMethodsPostOptions"
        Access-Control-Expose-Headers:
          $ref: "#/components/headers/AccessControlExposeHeadersJsonApi"
        Vary:
          $ref: "#/components/headers/HeaderVaryOrigin"
        X-Request-Id:
          $ref: "#/components/headers/RequestId"

    CardSvgPreflight:
      description: "CORS preflight response for SVG card requests"
      headers:
        Access-Control-Allow-Origin:
          $ref: "#/components/headers/AccessControlAllowOriginCardSvg"
        Access-Control-Allow-Headers:
          $ref: "#/components/headers/AccessControlAllowHeadersContentType"
        Access-Control-Allow-Methods:
          $ref: "#/components/headers/AccessControlAllowMethodsGetHeadOptions"
        Access-Control-Expose-Headers:
          $ref: "#/components/headers/AccessControlExposeHeadersCardSvg"
        Vary:
          $ref: "#/components/headers/HeaderVaryOrigin"
        X-Request-Id:
          $ref: "#/components/headers/RequestId"

    CronUnauthorizedJson:
      description: "Invalid or missing cron secret"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            unauthorized:
              value:
                error: "Unauthorized"
                category: "authentication"
                retryable: false
                status: 401
                recoverySuggestions: []

    CronServiceUnavailableJson:
      description: "Server-side cron authentication is not configured"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            missingCronSecret:
              value:
                error: "CRON_SECRET is not configured"
                category: "server_error"
                retryable: true
                status: 503
                recoverySuggestions: []

    UnauthorizedPlain:
      description: "Invalid or missing cron secret"
      content:
        text/plain:
          schema:
            type: string
          examples:
            unauthorized:
              value: "Unauthorized"

    InternalErrorPlain:
      description: "Plain-text internal server failure"
      content:
        text/plain:
          schema:
            type: string
          examples:
            failure:
              value: "Cron job failed"

    CardSvgOk:
      description: >-
        Rendered SVG image. Successful responses expose `X-Cache-Source` and
        `X-Card-Border-Radius`. Cache policy depends on the request: canonical
        renders use the long-lived card cache, explicit visual override
        requests use the shorter preview cache, and `_t` renders are no-store.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CardCacheControl"
        CDN-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        Edge-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        X-Card-Border-Radius:
          $ref: "#/components/headers/CardBorderRadius"
        X-Cache-Source:
          $ref: "#/components/headers/CardCacheSource"
      content:
        image/svg+xml:
          schema:
            type: string
          examples:
            svg:
              value: |-
                <?xml version="1.0" encoding="UTF-8"?>
                <svg width="400" height="120" xmlns="http://www.w3.org/2000/svg">
                  <rect width="100%" height="100%" fill="#0f172a" rx="12" />
                  <text x="50%" y="50%" fill="#e2e8f0" text-anchor="middle" dominant-baseline="middle">AniCards Sample</text>
                </svg>

    CardSvgBadRequest:
      description: "SVG-formatted client error. Error card responses are no-store."
      headers:
        Cache-Control:
          $ref: "#/components/headers/CardCacheControl"
        CDN-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        Edge-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        X-Card-Border-Radius:
          $ref: "#/components/headers/CardBorderRadius"
      content:
        image/svg+xml:
          schema:
            type: string
          examples:
            missingCardType:
              value: |-
                <?xml version="1.0" encoding="UTF-8"?>
                <svg xmlns="http://www.w3.org/2000/svg"><text>Client Error: Missing parameter: cardType</text></svg>

    CardSvgNotFound:
      description: "SVG-formatted not-found response. Error card responses are no-store."
      headers:
        Cache-Control:
          $ref: "#/components/headers/CardCacheControl"
        CDN-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        Edge-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        X-Card-Border-Radius:
          $ref: "#/components/headers/CardBorderRadius"
      content:
        image/svg+xml:
          schema:
            type: string
          examples:
            missingUser:
              value: |-
                <?xml version="1.0" encoding="UTF-8"?>
                <svg xmlns="http://www.w3.org/2000/svg"><text>Not Found: User not found</text></svg>

    CardSvgRateLimited:
      description: "SVG-formatted rate-limit response. Error card responses are no-store."
      headers:
        Cache-Control:
          $ref: "#/components/headers/CardCacheControl"
        CDN-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        Edge-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        X-Card-Border-Radius:
          $ref: "#/components/headers/CardBorderRadius"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
        X-RateLimit-Limit:
          $ref: "#/components/headers/RateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/RateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/RateLimitReset"
      content:
        image/svg+xml:
          schema:
            type: string
          examples:
            tooManyRequests:
              value: |-
                <?xml version="1.0" encoding="UTF-8"?>
                <svg xmlns="http://www.w3.org/2000/svg"><text>Client Error: Too many requests - try again later</text></svg>

    CardSvgInternalError:
      description: "SVG-formatted server error. Error card responses are no-store."
      headers:
        Cache-Control:
          $ref: "#/components/headers/CardCacheControl"
        CDN-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        Edge-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        X-Card-Border-Radius:
          $ref: "#/components/headers/CardBorderRadius"
      content:
        image/svg+xml:
          schema:
            type: string
          examples:
            failure:
              value: |-
                <?xml version="1.0" encoding="UTF-8"?>
                <svg xmlns="http://www.w3.org/2000/svg"><text>Server Error: An internal error occurred</text></svg>

    CardSvgServiceUnavailable:
      description: >-
        SVG-formatted temporary availability failure. Error card responses are
        no-store.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CardCacheControl"
        CDN-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        Edge-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        X-Card-Border-Radius:
          $ref: "#/components/headers/CardBorderRadius"
      content:
        image/svg+xml:
          schema:
            type: string
          examples:
            userUnavailable:
              value: |-
                <?xml version="1.0" encoding="UTF-8"?>
                <svg xmlns="http://www.w3.org/2000/svg"><text>Server Error: User data is temporarily unavailable</text></svg>
            cardUnavailable:
              value: |-
                <?xml version="1.0" encoding="UTF-8"?>
                <svg xmlns="http://www.w3.org/2000/svg"><text>Server Error: Card data is temporarily unavailable</text></svg>

    CardPngOk:
      description: >-
        Rasterized PNG image. Successful responses preserve the card-render
        cache headers and `X-Cache-Source` from the underlying SVG render.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CardCacheControl"
        CDN-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        Edge-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        X-Card-Border-Radius:
          $ref: "#/components/headers/CardBorderRadius"
        X-Cache-Source:
          $ref: "#/components/headers/CardCacheSource"
      content:
        image/png:
          schema:
            type: string
            format: binary

    CardPngBadRequest:
      description: "PNG-formatted client error"
      headers:
        Cache-Control:
          $ref: "#/components/headers/CardCacheControl"
        CDN-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        Edge-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        X-Card-Border-Radius:
          $ref: "#/components/headers/CardBorderRadius"
      content:
        image/png:
          schema:
            type: string
            format: binary

    CardPngNotFound:
      description: "PNG-formatted not-found response"
      headers:
        Cache-Control:
          $ref: "#/components/headers/CardCacheControl"
        CDN-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        Edge-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        X-Card-Border-Radius:
          $ref: "#/components/headers/CardBorderRadius"
      content:
        image/png:
          schema:
            type: string
            format: binary

    CardPngRateLimited:
      description: "PNG-formatted rate-limit response"
      headers:
        Cache-Control:
          $ref: "#/components/headers/CardCacheControl"
        CDN-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        Edge-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        X-Card-Border-Radius:
          $ref: "#/components/headers/CardBorderRadius"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
        X-RateLimit-Limit:
          $ref: "#/components/headers/RateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/RateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/RateLimitReset"
      content:
        image/png:
          schema:
            type: string
            format: binary

    CardPngInternalError:
      description: "PNG-formatted server error"
      headers:
        Cache-Control:
          $ref: "#/components/headers/CardCacheControl"
        CDN-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        Edge-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        X-Card-Border-Radius:
          $ref: "#/components/headers/CardBorderRadius"
      content:
        image/png:
          schema:
            type: string
            format: binary

    CardPngServiceUnavailable:
      description: "PNG-formatted temporary availability failure"
      headers:
        Cache-Control:
          $ref: "#/components/headers/CardCacheControl"
        CDN-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        Edge-Cache-Control:
          $ref: "#/components/headers/CardSharedCacheControl"
        X-Card-Border-Radius:
          $ref: "#/components/headers/CardBorderRadius"
      content:
        image/png:
          schema:
            type: string
            format: binary

  schemas:
    ApiError:
      type: object
      additionalProperties: true
      properties:
        error:
          type: string
        category:
          type: string
          enum:
            - "user_not_found"
            - "rate_limited"
            - "network_error"
            - "invalid_data"
            - "server_error"
            - "timeout"
            - "authentication"
            - "unknown"
        retryable:
          type: boolean
        status:
          type: integer
          minimum: 400
          maximum: 599
        recoverySuggestions:
          type: array
          items:
            $ref: "#/components/schemas/RecoverySuggestion"
      required:
        - error
        - category
        - retryable
        - status
        - recoverySuggestions

    ConflictError:
      allOf:
        - $ref: "#/components/schemas/ApiError"
        - type: object
          properties:
            currentUpdatedAt:
              type: string
              format: date-time
          required:
            - currentUpdatedAt

    RecoverySuggestion:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
        description:
          type: string
        actionUrl:
          type: string
        actionLabel:
          type: string
      required:
        - title
        - description

    ErrorReportRecorded:
      type: object
      additionalProperties: false
      properties:
        recorded:
          type: boolean
          const: true
      required:
        - recorded

    ErrorReportRequestRecoverySuggestion:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          minLength: 1
          maxLength: 240
        actionLabel:
          type: string
          minLength: 1
          maxLength: 80
      required:
        - title
        - description

    ErrorReportSource:
      type: string
      enum:
        - "user_action"
        - "client_hook"
        - "analytics_instrumentation"
        - "react_error_boundary"
        - "app_router_error_boundary"
        - "api_route"

    ErrorReportMetadataValue:
      description: >-
        Primitive metadata value retained after sanitization. Longer strings
        are truncated before durable persistence.
      anyOf:
        - type: string
          maxLength: 160
        - type: number
        - type: boolean
        - type: "null"

    ErrorReportMetadata:
      type: object
      description: >-
        Optional primitive-only metadata map. Nested objects and arrays are
        ignored. Keys longer than 64 characters are truncated before durable
        persistence.
      propertyNames:
        type: string
        maxLength: 64
      additionalProperties:
        $ref: "#/components/schemas/ErrorReportMetadataValue"

    ErrorReportRequest:
      type: object
      additionalProperties: true
      description: >-
        Structured client error report durably recorded by `/api/error-reports`.
        `userAction` and `message` are required. Unknown top-level fields are
        ignored, client-supplied `userId` and `username` are discarded, and
        valid client `id`, `timestamp`, `category`, `retryable`, and
        `recoverySuggestions` values are sanitized then preserved.
      properties:
        id:
          type: string
          pattern: "^[A-Za-z0-9._:-]{8,120}$"
          description: >-
            Optional stable client incident identifier. When omitted or
            invalid, the runtime falls back to a generated incident ID.
        timestamp:
          type: integer
          format: int64
          minimum: 1
          description: >-
            Optional original client occurrence timestamp in Unix
            milliseconds. When omitted or invalid, the runtime falls back to
            the current report time.
        source:
          $ref: "#/components/schemas/ErrorReportSource"
        userAction:
          type: string
          minLength: 1
          maxLength: 120
        message:
          type: string
          minLength: 1
          maxLength: 2000
        category:
          type: string
          enum:
            - "user_not_found"
            - "rate_limited"
            - "network_error"
            - "invalid_data"
            - "server_error"
            - "timeout"
            - "authentication"
            - "unknown"
        retryable:
          type: boolean
        recoverySuggestions:
          type: array
          maxItems: 6
          items:
            $ref: "#/components/schemas/ErrorReportRequestRecoverySuggestion"
        requestId:
          type: string
          pattern: "^[A-Za-z0-9._:-]{8,120}$"
          description: >-
            Optional request correlation ID. When omitted or invalid, the
            server falls back to the ingestion request ID.
        errorName:
          type: string
          minLength: 1
          maxLength: 120
        route:
          type: string
          minLength: 1
          maxLength: 512
          description: >-
            Current client route. The durable telemetry pipeline normalizes it
            to a privacy-safe page path before persistence.
        statusCode:
          type: integer
          minimum: 400
          maximum: 599
        digest:
          type: string
          minLength: 1
          maxLength: 120
        stack:
          type: string
          minLength: 1
          maxLength: 8000
          description: >-
            Optional stack trace. The telemetry pipeline strips file paths,
            URLs, and other sensitive details before persistence.
        componentStack:
          type: string
          minLength: 1
          maxLength: 8000
          description: >-
            Optional React component stack. The telemetry pipeline strips file
            paths, URLs, and other sensitive details before persistence.
        metadata:
          $ref: "#/components/schemas/ErrorReportMetadata"
        userId:
          deprecated: true
          description: >-
            Ignored if supplied. Client-provided identifiers are discarded and
            never persisted by this endpoint.
        username:
          deprecated: true
          description: >-
            Ignored if supplied. Client-provided usernames are discarded and
            never persisted by this endpoint.
      required:
        - userAction
        - message

    AniListRequest:
      oneOf:
        - $ref: "#/components/schemas/AniListGetUserIdOperationRequest"
        - $ref: "#/components/schemas/AniListGetUserStatsOperationRequest"
        - $ref: "#/components/schemas/AniListGetUserIdCompatibilityRequest"
        - $ref: "#/components/schemas/AniListGetUserStatsCompatibilityRequest"
      description: >-
        Strict `/api/anilist` request contract. `operation` mode is preferred
        and forwards the canonical server-side GraphQL document for the
        selected operation. Query-text mode is deprecated compatibility only
        and accepts only the built-in AniCards `GetUserId` and `GetUserStats`
        documents after server-side whitespace normalization. The full JSON
        request body is capped at `32768` bytes; malformed JSON returns `400`
        and oversized bodies return `413`.

    AniListUsername:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "^[a-zA-Z0-9_\\-\\s]*$"
      description: >-
        AniList username. The server trims surrounding whitespace before
        validation.

    AniListUserId:
      type: integer
      minimum: 1
      description: "Positive AniList numeric user ID"

    AniListIgnoredQueryText:
      type: string
      minLength: 1
      deprecated: true
      description: >-
        Optional legacy query text. When `operation` is present, the server
        ignores this field and forwards the built-in document for that
        operation.

    AniListGetUserIdQueryText:
      type: string
      minLength: 1
      deprecated: true
      pattern: '^\s*query\s+GetUserId\b[\s\S]*$'
      description: >-
        Deprecated compatibility query text. The server normalizes whitespace
        and requires the full built-in `GetUserId` document; arbitrary custom
        GraphQL documents are rejected with `400`.

    AniListGetUserStatsQueryText:
      type: string
      minLength: 1
      deprecated: true
      pattern: '^\s*query\s+GetUserStats\b[\s\S]*$'
      description: >-
        Deprecated compatibility query text. The server normalizes whitespace
        and requires the full built-in `GetUserStats` document; arbitrary custom
        GraphQL documents are rejected with `400`.

    AniListGetUserIdVariables:
      type: object
      additionalProperties: false
      properties:
        userName:
          $ref: "#/components/schemas/AniListUsername"
      required:
        - userName

    AniListGetUserStatsVariables:
      type: object
      additionalProperties: false
      properties:
        userId:
          $ref: "#/components/schemas/AniListUserId"
      required:
        - userId

    AniListGetUserIdOperationRequest:
      type: object
      additionalProperties: false
      description: >-
        Preferred request shape for resolving an AniList username to its
        numeric AniList user ID.
      properties:
        operation:
          type: string
          const: "GetUserId"
        variables:
          $ref: "#/components/schemas/AniListGetUserIdVariables"
        query:
          $ref: "#/components/schemas/AniListIgnoredQueryText"
      required:
        - operation
        - variables

    AniListGetUserStatsOperationRequest:
      type: object
      additionalProperties: false
      description: >-
        Preferred request shape for resolving the AniCards AniList statistics
        payload for a known numeric AniList user ID.
      properties:
        operation:
          type: string
          const: "GetUserStats"
        variables:
          $ref: "#/components/schemas/AniListGetUserStatsVariables"
        query:
          $ref: "#/components/schemas/AniListIgnoredQueryText"
      required:
        - operation
        - variables

    AniListGetUserIdCompatibilityRequest:
      type: object
      additionalProperties: false
      description: >-
        Deprecated backward-compatible request shape. Prefer `operation:
        "GetUserId"` instead.
      properties:
        query:
          $ref: "#/components/schemas/AniListGetUserIdQueryText"
        variables:
          $ref: "#/components/schemas/AniListGetUserIdVariables"
      required:
        - query
        - variables

    AniListGetUserStatsCompatibilityRequest:
      type: object
      additionalProperties: false
      description: >-
        Deprecated backward-compatible request shape. Prefer `operation:
        "GetUserStats"` instead.
      properties:
        query:
          $ref: "#/components/schemas/AniListGetUserStatsQueryText"
        variables:
          $ref: "#/components/schemas/AniListGetUserStatsVariables"
      required:
        - query
        - variables

    GraphQLData:
      type: object
      additionalProperties: true
      description: "Unwrapped AniList GraphQL `data` payload"

    CardType:
      type: string
      enum:
        - "animeStats"
        - "socialStats"
        - "socialMilestones"
        - "mangaStats"
        - "animeGenres"
        - "animeTags"
        - "animeVoiceActors"
        - "animeStudios"
        - "animeStaff"
        - "mangaGenres"
        - "mangaTags"
        - "mangaStaff"
        - "animeStatusDistribution"
        - "mangaStatusDistribution"
        - "animeFormatDistribution"
        - "mangaFormatDistribution"
        - "animeSourceMaterialDistribution"
        - "animeSeasonalPreference"
        - "animeEpisodeLengthPreferences"
        - "animeGenreSynergy"
        - "animeScoreDistribution"
        - "mangaScoreDistribution"
        - "animeYearDistribution"
        - "mangaYearDistribution"
        - "animeCountry"
        - "mangaCountry"
        - "profileOverview"
        - "favoritesSummary"
        - "favoritesGrid"
        - "recentActivitySummary"
        - "activityStreaks"
        - "topActivityDays"
        - "statusCompletionOverview"
        - "milestones"
        - "personalRecords"
        - "planningBacklog"
        - "mostRewatched"
        - "currentlyWatchingReading"
        - "animeMangaOverview"
        - "scoreCompareAnimeManga"
        - "countryDiversity"
        - "genreDiversity"
        - "formatPreferenceOverview"
        - "releaseEraPreference"
        - "startYearMomentum"
        - "lengthPreference"
        - "tagCategoryDistribution"
        - "tagDiversity"
        - "seasonalViewingPatterns"
        - "droppedMedia"
        - "reviewStats"
        - "studioCollaboration"

    CardVariation:
      type: string
      enum:
        - "default"
        - "vertical"
        - "compact"
        - "minimal"
        - "badges"
        - "pie"
        - "donut"
        - "bar"
        - "radar"
        - "horizontal"
        - "cumulative"
        - "anime"
        - "manga"
        - "characters"
        - "staff"
        - "studios"
        - "mixed"
        - "combined"
        - "split"

    CardColorPreset:
      type: string
      description: >-
        Accepted runtime color preset keys from
        `components/stat-card-generator/constants.ts`. Named presets apply
        their palette before individual URL core-color overrides are applied.
        The special value `custom` means “use saved custom colors” unless all
        four core URL colors are present, in which case the URL colors are used
        directly.
      enum:
        - "anicardsDark"
        - "anicardsDarkGradient"
        - "anicardsLight"
        - "anicardsLightGradient"
        - "anilistDark"
        - "anilistDarkGradient"
        - "anilistLight"
        - "anilistLightGradient"
        - "arcticAurora"
        - "aurora"
        - "bubblegum"
        - "canyonSunrise"
        - "cherryBlossom"
        - "citrus"
        - "coral"
        - "coralReef"
        - "cosmicNebula"
        - "custom"
        - "cyberpunk"
        - "darkModeBlue"
        - "default"
        - "earthyGreen"
        - "emberGlow"
        - "fire"
        - "fireEmber"
        - "forest"
        - "forestDepth"
        - "galaxy"
        - "goldenHour"
        - "goldStandard"
        - "lavender"
        - "lavenderBloom"
        - "midnight"
        - "mint"
        - "mintFresh"
        - "monochromeGray"
        - "neonGlow"
        - "ocean"
        - "oceanBreeze"
        - "oceanWaves"
        - "pastelDreams"
        - "polarNight"
        - "purpleDusk"
        - "purpleHaze"
        - "rainforestMist"
        - "redAlert"
        - "rosegold"
        - "seafoam"
        - "skylineAzure"
        - "solarizedLight"
        - "springGarden"
        - "stardust"
        - "sunriseMeadow"
        - "sunset"
        - "sunsetGradient"
        - "synthwave"
        - "twilight"
        - "twilightSky"
        - "verdantTwilight"
        - "vintageSepia"

    HexColor:
      type: string
      pattern: "^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})([0-9a-fA-F]{2})?$"
      description: "3, 6, or 8 digit hex color string"

    GradientStop:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        color:
          $ref: "#/components/schemas/HexColor"
        offset:
          type: number
          minimum: 0
          maximum: 100
        opacity:
          type: number
          minimum: 0
          maximum: 1
      required:
        - color
        - offset

    GradientDefinition:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - "linear"
            - "radial"
        stops:
          type: array
          minItems: 2
          items:
            $ref: "#/components/schemas/GradientStop"
        angle:
          type: number
          minimum: 0
          maximum: 360
        cx:
          type: number
          minimum: 0
          maximum: 100
        cy:
          type: number
          minimum: 0
          maximum: 100
        r:
          type: number
          minimum: 0
          maximum: 100
      required:
        - type
        - stops

    StringifiedGradientDefinition:
      type: string
      pattern: "^\\s*\\{[\\s\\S]*\\}\\s*$"
      description: >-
        Backwards-compatible JSON string containing a gradient definition. The
        server accepts this form in stored color fields.

    ColorValue:
      description: "Stored card colors accept a hex string, a gradient object, or a stringified gradient JSON object."
      oneOf:
        - $ref: "#/components/schemas/HexColor"
        - $ref: "#/components/schemas/GradientDefinition"
        - $ref: "#/components/schemas/StringifiedGradientDefinition"

    StoredCardName:
      type: string
      minLength: 1
      description: >-
        Card identifier returned by stored-card reads. `/api/store-cards`
        writes only accept current `CardType` values, but `/api/get-cards`
        may still return legacy unsupported IDs that were already stored before
        the current allow-list was introduced.

    StoredCardConfig:
      type: object
      additionalProperties: false
      properties:
        cardName:
          $ref: "#/components/schemas/StoredCardName"
        variation:
          $ref: "#/components/schemas/CardVariation"
        colorPreset:
          type: string
        titleColor:
          $ref: "#/components/schemas/ColorValue"
        backgroundColor:
          $ref: "#/components/schemas/ColorValue"
        textColor:
          $ref: "#/components/schemas/ColorValue"
        circleColor:
          $ref: "#/components/schemas/ColorValue"
        borderColor:
          type: string
          description: >-
            Border color string. The route validates it with the same color
            parser used for stored colors.
        borderRadius:
          type: number
          minimum: 0
          maximum: 100
        showFavorites:
          type: boolean
        useStatusColors:
          type: boolean
        showPiePercentages:
          type: boolean
        gridCols:
          type: integer
          minimum: 1
          maximum: 5
        gridRows:
          type: integer
          minimum: 1
          maximum: 5
        useCustomSettings:
          type: boolean
        disabled:
          type: boolean
      required:
        - cardName
      description: >-
        Stored per-card configuration returned by `/api/get-cards`. Reads may
        include legacy unsupported `cardName` values that are preserved for
        compatibility until the next successful write. `/api/store-cards`
        accepts partial patch entries and merges them with the existing stored
        record, so most fields are optional even for enabled cards. Disabled
        entries may omit `variation` and all per-card colors.

    StoreCardsPatchCard:
      allOf:
        - $ref: "#/components/schemas/StoredCardConfig"
        - type: object
          properties:
            cardName:
              $ref: "#/components/schemas/CardType"
          required:
            - cardName
      description: >-
        Incoming card patch entry for `/api/store-cards`. Writes only accept
        currently supported `CardType` values.

    GlobalCardSettings:
      type: object
      additionalProperties: false
      properties:
        colorPreset:
          type: string
        titleColor:
          $ref: "#/components/schemas/ColorValue"
        backgroundColor:
          $ref: "#/components/schemas/ColorValue"
        textColor:
          $ref: "#/components/schemas/ColorValue"
        circleColor:
          $ref: "#/components/schemas/ColorValue"
        borderEnabled:
          type: boolean
        borderColor:
          type: string
        borderRadius:
          type: number
          minimum: 0
          maximum: 100
        useStatusColors:
          type: boolean
        showPiePercentages:
          type: boolean
        showFavorites:
          type: boolean
        gridCols:
          type: integer
          minimum: 1
          maximum: 5
        gridRows:
          type: integer
          minimum: 1
          maximum: 5

    CardsRecord:
      type: object
      additionalProperties: false
      description: >-
        Persisted cards record returned by `/api/get-cards`. Reads preserve
        already-stored legacy unsupported `cardName` values until the next
        successful `/api/store-cards` write.
      properties:
        userId:
          type: integer
        cards:
          type: array
          items:
            $ref: "#/components/schemas/StoredCardConfig"
        globalSettings:
          $ref: "#/components/schemas/GlobalCardSettings"
        updatedAt:
          type: string
          format: date-time
      required:
        - userId
        - cards
        - updatedAt

    StoreCardsRequest:
      type: object
      additionalProperties: false
      description: >-
        Partial-update payload for `/api/store-cards`. The route merges incoming
        card entries and global settings into the existing Redis record,
        preserves omitted card settings, and backfills any newly supported base
        card types as disabled records before persisting. Production writes are
        accepted only when the browser also presents a matching per-user
        protected write grant. Optional `statsData` must either be `{}` or a
        full normalized AniList stats snapshot; other malformed non-empty
        objects are rejected.
      properties:
        userId:
          type: integer
        statsData:
          $ref: "#/components/schemas/StoreCardsStatsData"
          description: >-
            Optional stats payload carried by the editor workflow. Empty
            placeholder objects are accepted, but non-empty objects must match
            the normalized AniList snapshot shape. A top-level `error` field
            causes the route to reject the request.
        cards:
          type: array
          items:
            $ref: "#/components/schemas/StoreCardsPatchCard"
        globalSettings:
          $ref: "#/components/schemas/GlobalCardSettings"
        ifMatchUpdatedAt:
          type: string
          format: date-time
        cardOrder:
          type: array
          items:
            $ref: "#/components/schemas/CardType"
      required:
        - userId
        - cards

    StoreCardsSuccess:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          const: true
        userId:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required:
        - success
        - userId
        - updatedAt

    StoreUserRequest:
      type: object
      additionalProperties: false
      description: >-
        Explicit minimized persistence input. Top-level fields are allow-listed,
        and `stats` must match the normalized AniList-derived snapshot shape
        that the server validates and persists. Production writes are accepted
        only when the browser presents a matching per-user protected write
        grant from a recent trusted AniCards read/proxy response.
      properties:
        userId:
          type: integer
        username:
          type: string
          minLength: 1
          maxLength: 100
          nullable: true
          description: >-
            Optional AniList username alias. Explicit `null` is accepted and is
            treated the same as omitting the field before normalization. When a
            protected write grant is enforced, the server persists the bound
            username from the approved snapshot instead of treating this field
            as authoritative.
        ifMatchUpdatedAt:
          type: string
          format: date-time
          description: >-
            Optional optimistic-concurrency token. When supplied, the write is
            rejected with `409` if the stored record has a different
            `updatedAt`.
        stats:
          $ref: "#/components/schemas/UserStatsData"
          description: >-
            Normalized AniList-derived snapshot. Arrays or partial placeholder
            objects are rejected. In production this payload must match the
            recent server-approved `/api/anilist` `GetUserStats` snapshot bound
            to the browser's protected write grant.
      required:
        - userId
        - stats

    StoreUserSuccess:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          const: true
        userId:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required:
        - success
        - userId
        - updatedAt

    ConvertRequest:
      type: object
      additionalProperties: false
      description: >-
        JSON envelope for `/api/convert`. The full request body is capped at
        `1250000` bytes; malformed JSON returns `400` and oversized bodies
        return `413` before route-specific SVG validation runs.
      properties:
        svgUrl:
          type: string
          description: >-
            Absolute or relative URL to an SVG resource on an allow-listed
            AniCards host. Relative URLs resolve against the convert request
            origin/host; the public deployment represented by this spec uses
            relative AniCards card paths such as `/api/card.svg?...` on the
            API host above. Ignored when `svgContent` is also supplied.
        svgContent:
          type: string
          description: >-
            Inline SVG markup to convert directly without refetching a remote
            URL. When both `svgContent` and `svgUrl` are supplied, this inline
            markup takes precedence. The inline SVG itself is capped at
            `1000000` bytes after the outer JSON envelope has been validated.
        format:
          type: string
          enum:
            - "png"
            - "webp"
          default: "png"
        responseType:
          type: string
          enum:
            - "json"
            - "binary"
          default: "binary"
          description: >-
            When set to `json`, the route returns a data URL payload. When set
            to `binary` or omitted, the route streams the converted image with
            the appropriate image content type. Any other value is rejected
            with `400`.
      anyOf:
        - required:
            - svgUrl
        - required:
            - svgContent

    ConvertResponse:
      type: object
      additionalProperties: false
      properties:
        format:
          type: string
          enum:
            - "png"
            - "webp"
          description: "Actual raster format returned in `imageDataUrl`."
        imageDataUrl:
          type: string
          description: >-
            Data URL for the converted image using the requested raster format.
      required:
        - format
        - imageDataUrl

    PageInfo:
      type: object
      additionalProperties: true
      properties:
        total:
