      description: >-
        Optional editor-carried stats payload. The route accepts an empty
        object placeholder or a full normalized `UserStatsData` snapshot; other
        non-empty object shapes are rejected.
      oneOf:
        - $ref: "#/components/schemas/EmptyObject"
        - $ref: "#/components/schemas/UserStatsData"

    UserPages:
      type: object
      additionalProperties: true
      properties:
        followersPage:
          type: object
          additionalProperties: true
        followingPage:
          type: object
          additionalProperties: true
        threadsPage:
          type: object
          additionalProperties: true
        threadCommentsPage:
          type: object
          additionalProperties: true
        reviewsPage:
          type: object
          additionalProperties: true

    UserAggregateKey:
      type: string
      enum:
        - animeSourceMaterialDistributionTotals
        - animeSeasonalPreferenceTotals
        - animeGenreSynergyTotals
        - studioCollaborationTotals

    UserPayloadCompleteness:
      type: object
      additionalProperties: false
      description: >-
        Snapshot completeness metadata describing the sampled user payload that
        was retained in storage.
      properties:
        sampled:
          type: boolean
        fullHistory:
          type: boolean
          enum:
            - false
        boundedSections:
          type: array
          items:
            type: string
        availableAggregates:
          type: array
          items:
            $ref: "#/components/schemas/UserAggregateKey"
        missingAggregates:
          type: array
          items:
            $ref: "#/components/schemas/UserAggregateKey"
      required:
        - sampled
        - fullHistory
        - boundedSections
        - availableAggregates
        - missingAggregates

    UserSnapshotRef:
      type: object
      additionalProperties: false
      description: Stable identifier for one committed user snapshot.
      properties:
        token:
          type: string
        revision:
          type: integer
          minimum: 1
        updatedAt:
          type: string
          format: date-time
        committedAt:
          type: string
          format: date-time
      required:
        - token
        - revision
        - updatedAt
        - committedAt

    PublicUserRecordMetadata:
      type: object
      additionalProperties: false
      description: >-
        Public metadata about the sampled record returned by `/api/get-user`,
        including storage shape and snapshot completeness.
      properties:
        storageFormat:
          type: string
          enum:
            - committed-split
            - legacy-split
            - legacy
        schemaVersion:
          type: integer
          minimum: 1
        snapshot:
          $ref: "#/components/schemas/UserSnapshotRef"
        completeness:
          $ref: "#/components/schemas/UserPayloadCompleteness"
      required:
        - storageFormat
        - schemaVersion
        - completeness

    PublicUserRecord:
      type: object
      additionalProperties: false
      description: >-
        Bounded public lookup DTO returned by `/api/get-user`. Internal
        persistence metadata such as request IP buckets and record timestamps are
        intentionally excluded.
      properties:
        userId:
          type: integer
          minimum: 1
        username:
          type: string
        stats:
          type: object
          additionalProperties: true
          description: "Full stored AniList-derived payload"
        statistics:
          type: object
          additionalProperties: true
          description: "Convenience view of `stats.User.statistics`"
        favourites:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/FavouriteCollection"
        pages:
          $ref: "#/components/schemas/UserPages"
        aggregates:
          type: object
          additionalProperties: true
        recordMeta:
          $ref: "#/components/schemas/PublicUserRecordMetadata"
      required:
        - userId
        - stats
        - statistics
        - favourites
    UserBootstrapRecord:
      type: object
      additionalProperties: false
      description: >-
        Lightweight identity DTO returned by `/api/get-user?view=bootstrap`.
        Used by the editor to resolve canonical usernames and avatars before the
        heavier card payload is loaded.
      properties:
        userId:
          type: integer
          minimum: 1
        username:
          type: string
        avatarUrl:
          type: string
          nullable: true
        recordMeta:
          $ref: "#/components/schemas/PublicUserRecordMetadata"
      required:
        - userId

    AnalyticsReport:
      type: object
      additionalProperties: false
      properties:
        summary:
          type: object
          additionalProperties: true
        raw_data:
          type: object
          additionalProperties: true
        generatedAt:
          type: string
          format: date-time
      required:
        - summary
        - raw_data
        - generatedAt

    AnalyticsReportList:
      type: object
      additionalProperties: false
      properties:
        reports:
          type: array
          items:
            $ref: "#/components/schemas/AnalyticsReport"
        count:
          type: integer
          minimum: 0
        retentionLimit:
          type: integer
          minimum: 1
      required:
        - reports
        - count
        - retentionLimit
