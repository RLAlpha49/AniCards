  /api/error-reports:
    post:
      operationId: "reportClientError"
      tags:
        - "telemetry"
      summary: "Record a structured client error report"
      description: >-
        Validates and durably records privacy-safe structured client error
        reports before returning success. In production this route enforces
        same-origin validation, a verified client IP, the shared request-proof
        cookie, and a dedicated `3 requests / 10 s` limiter. The server
        sanitizes the payload, ignores client-supplied `userId` and
        `username`, preserves valid client incident `id` and `timestamp`
        values, and drops unsupported nested metadata values before
        persistence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorReportRequest"
            examples:
              reactBoundary:
                value:
                  id: "rep-client-incident-12345"
                  timestamp: 1776057600000
                  source: "react_error_boundary"
                  userAction: "render_component_tree"
                  message: "Failed to fetch user Alex profile"
                  category: "network_error"
                  retryable: true
                  recoverySuggestions:
                    - title: "Retry the request"
                      description: "Wait for the network to recover, then try loading the profile again."
                      actionLabel: "Retry"
                  route: "/user/Alex?tab=cards"
                  requestId: "req-error-route-12345"
                  errorName: "TypeError"
                  metadata:
                    boundary: "client_error_boundary"
                    tab: "cards"
                    retried: false
              analyticsInstrumentation:
                value:
                  id: "rep-analytics-incident-12345"
                  timestamp: 1776057602500
                  source: "analytics_instrumentation"
                  userAction: "analytics_pageview_dispatch"
                  message: "Failed to fetch analytics beacon"
                  category: "network_error"
                  retryable: true
                  requestId: "req-analytics-route-12345"
                  errorName: "TypeError"
                  metadata:
                    analyticsFailureBucket: "network"
                    analyticsFailureCount: 3
                    analyticsSuppressedDuplicates: 1
                    pagePath: "/user/[username]?filter=[redacted]"
      responses:
        "200":
          description: "Structured error report durably recorded"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorReportRecorded"
              examples:
                recorded:
                  value:
                    recorded: true
        "400":
          description: "Malformed JSON body or invalid required fields"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidJson:
                  value:
                    error: "Invalid JSON body"
                    category: "invalid_data"
                    retryable: false
                    status: 400
                    recoverySuggestions: []
                invalidPayload:
                  value:
                    error: "Invalid error report payload"
                    category: "invalid_data"
                    retryable: false
                    status: 400
                    recoverySuggestions: []
        "401":
          $ref: "#/components/responses/UnauthorizedJson"
        "429":
          $ref: "#/components/responses/TooManyRequestsJson"
        "500":
          description: "Unexpected structured error ingestion failure before durable recording"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                failure:
                  value:
                    error: "Failed to record error report"
                    category: "server_error"
                    retryable: true
                    status: 500
                    recoverySuggestions: []
        "503":
          description: >-
            Temporary availability failure or required security configuration
            issue before durable recording
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                unavailable:
                  value:
                    error: "Structured error reporting is temporarily unavailable"
                    category: "server_error"
                    retryable: true
                    status: 503
                    recoverySuggestions: []
                misconfigured:
                  value:
                    error: "Server misconfigured"
                    category: "server_error"
                    retryable: true
                    status: 503
                    recoverySuggestions: []
    options:
      operationId: "preflightErrorReports"
      tags:
        - "telemetry"
      summary: "CORS preflight for structured error reporting"
      description: >-
        Returns the CORS headers required for browser clients to POST
        structured error reports, including support for `X-Request-Id`.
      responses:
        "200":
          $ref: "#/components/responses/ErrorReportsPreflight"

  /api/convert:
    post:
      operationId: "convertSvg"
      tags:
        - "convert"
      summary: "Fetch an allowed SVG and convert it to PNG or WebP"
      description: >-
        Accepts either an allow-listed `svgUrl` or inline `svgContent`,
        sanitizes the markup, and converts it to a raster image. When both are
        supplied, inline `svgContent` wins and no remote fetch occurs. JSON
        responses return a format-agnostic data URL payload, while
        `responseType: "binary"` or an omitted `responseType` streams the
        converted image directly; any other `responseType` is rejected with
        `400`. Relative `svgUrl` values resolve against the convert request
        origin/host, so the public examples below use relative AniCards card
        paths that stay on this API server host instead of a separate site
        host. SSRF protections reject unsafe protocols, IP literals,
        redirects, and hosts outside the configured AniCards allow-list. JSON
        request bodies larger than `1250000` bytes are rejected with `413`
        before SVG parsing. This JSON envelope limit is separate from the
        later `1000000`-byte inline/fetched SVG cap and the raster
        dimension/pixel limits.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvertRequest"
            examples:
              png:
                value:
                  svgUrl: "/api/card.svg?userId=12345&cardType=animeStats"
                  format: "png"
                  responseType: "json"
              webp:
                value:
                  svgUrl: "/api/card.svg?userId=12345&cardType=favoritesGrid&variation=mixed"
                  format: "webp"
                  responseType: "json"
              inlineBinary:
                value:
                  svgContent: '<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"></svg>'
                  format: "webp"
                  responseType: "binary"
              inlineWins:
                value:
                  svgUrl: "/api/card.svg?userId=12345&cardType=animeStats"
                  svgContent: '<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="#0f172a" /></svg>'
                  format: "png"
                  responseType: "json"
      responses:
        "200":
          description: >-
            Converted raster image as JSON when `responseType` is `json`, or
            streamed binary when `responseType` is `binary` or omitted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvertResponse"
              examples:
                png:
                  value:
                    format: "png"
                    imageDataUrl: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..."
                webp:
                  value:
                    format: "webp"
                    imageDataUrl: "data:image/webp;base64,UklGRlIAAABXRUJQVlA4..."
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        "400":
          description: "Malformed JSON, missing `svgUrl`, invalid URL, invalid format, or invalid `responseType`"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidJson:
                  value:
                    error: "Invalid JSON body"
                    category: "invalid_data"
                    retryable: false
                    status: 400
                    recoverySuggestions:
                      - title: "Check your input"
                        description: "Make sure all required fields are filled in correctly"
                missingUrl:
                  value:
                    error: "Missing svgUrl or svgContent parameter"
                invalidUrl:
                  value:
                    error: "Invalid URL format"
                invalidFormat:
                  value:
                    error: "Invalid format parameter"
                invalidResponseType:
                  value:
                    error: "Invalid responseType parameter"
        "401":
          $ref: "#/components/responses/UnauthorizedJson"
        "403":
          description: "Blocked by the domain/protocol allow-list or by redirect protection"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                forbidden:
                  value:
                    error: "Unauthorized or unsafe domain/protocol"
                redirectBlocked:
                  value:
                    error: "SVG redirects are not allowed"
        "404":
          description: "Allow-listed upstream SVG was not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                missingUpstream:
                  value:
                    error: "Failed to fetch SVG"
        "413":
          description: "JSON request body exceeded 1250000 bytes, inline/fetched SVG exceeded 1000000 bytes, or rasterized output exceeded dimension/pixel limits"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                jsonBodyTooLarge:
                  value:
                    error: "Request body too large"
                    category: "invalid_data"
                    retryable: false
                    status: 413
                    recoverySuggestions: []
                    maxBytes: 1250000
                responseTooLarge:
                  value:
                    error: "SVG response too large"
                rasterTooLarge:
                  value:
                    error: "SVG rasterization exceeds pixel limits"
        "415":
          description: "Fetched or inline content was not valid SVG markup"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidInline:
                  value:
                    error: "Provided content is not a valid SVG"
                invalidFetched:
                  value:
                    error: "Fetched content is not a valid SVG"
        "429":
          $ref: "#/components/responses/TooManyRequestsJson"
        "500":
          description: "Unexpected rasterization or conversion failure"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                conversionFailure:
                  value:
                    error: "Conversion failed"
        "502":
          description: "Transient transport failure while fetching the upstream SVG"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                upstreamTransport:
                  value:
                    error: "Failed to fetch SVG"
        "503":
          description: "Allow-listed upstream SVG source was temporarily unavailable"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                upstreamUnavailable:
                  value:
                    error: "Failed to fetch SVG"
        "504":
          description: "Timed out while fetching the upstream SVG"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                upstreamTimeout:
                  value:
                    error: "SVG fetch timed out"
    options:
      operationId: "preflightConvertSvg"
      tags:
        - "convert"
      summary: "CORS preflight for SVG conversion requests"
      description: >-
        Returns the CORS headers required for browser clients to POST SVG
        conversion requests.
      responses:
        "200":
          $ref: "#/components/responses/JsonPostPreflight"

  /api/cron:
