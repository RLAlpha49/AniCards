# Hand-maintained public API contract. Update this file in the same PR as any
# public route, request/response, header, alias, or privacy-surface change.
# Validate it against the current route behavior and relevant tests.
openapi: "3.2.0"
jsonSchemaDialect: "https://spec.openapis.org/oas/3.1/dialect/base"
info:
  title: "AniCards Public API"
  version: "1.0.0"
  description: >-
    Hand-maintained OpenAPI 3.2.0 specification for the live AniCards Next.js
    route handlers, validated against the current codebase behavior and tests.
    Storage-related routes persist AniList-derived user snapshots and card
    editor configuration in Upstash Redis; the repository's current privacy
    posture, telemetry consent model, and retention caveats are documented in
    `docs/PRIVACY.md`.
  license:
    name: "MIT"
    url: "https://opensource.org/licenses/MIT"
  contact:
    name: "Alpha49 (AniCards)"
    url: "https://api.anicards.alpha49.com"
    email: "contact@alpha49.com"
servers:
  - url: "https://api.anicards.alpha49.com"
    description: "Production public API host"
security: []
tags:
  - name: "anilist"
    description: "Proxy access to AniList GraphQL"
  - name: "card"
    description: "SVG and PNG card endpoints, aliases, and legacy compatibility notices"
  - name: "cards"
    description: "Stored card configuration retrieval"
  - name: "convert"
    description: "SVG-to-raster conversion"
  - name: "cron"
    description: "Background refresh and analytics jobs"
  - name: "store"
    description: "Storage endpoints for users and card configurations"
  - name: "telemetry"
    description: "Structured client error-report ingestion"
  - name: "user"
    description: "Stored user lookup by ID or username"
paths:
  /api/anilist:
    post:
      operationId: "proxyAniList"
      tags:
        - "anilist"
      summary: "Proxy approved AniList GraphQL operations"
      description: >-
        Accepts only the built-in AniCards AniList operations `GetUserId` and
        `GetUserStats`, forwards the canonical server-side GraphQL document for
        the selected operation, and returns the upstream `data` payload
        unwrapped. Supplying `operation` is the preferred contract. Deprecated
        query-text compatibility remains available only for the server-approved
        documents and rejects arbitrary custom GraphQL operations with `400`.
        JSON request bodies larger than `32768` bytes are rejected with `413`,
        while malformed JSON bodies return `400`. In production this route also
        enforces verified-client-IP,
        request-proof, same-origin, and shared rate-limit guards.
      parameters:
        - in: header
          name: X-Test-Status
          required: false
          schema:
            type: string
            enum:
              - "429"
              - "500"
          description: >-
            Development-only header used by the route tests to simulate 429 and
            500 responses.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AniListRequest"
            examples:
              getUserIdByOperation:
                value:
                  operation: "GetUserId"
                  variables:
                    userName: "sampleuser"
              getUserStatsByOperation:
                value:
                  operation: "GetUserStats"
                  variables:
                    userId: 12345
              getUserIdByCompatibilityQuery:
                value:
                  query: |-
                    query GetUserId($userName: String) {
                      User(name: $userName) {
                        id
                      }
                    }
                  variables:
                    userName: "sampleuser"
      responses:
        "200":
          description: >-
            Unwrapped AniList GraphQL `data` payload for the approved
            `GetUserId` or `GetUserStats` operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphQLData"
              examples:
                getUserId:
                  value:
                    User:
                      id: 12345
                getUserStats:
                  value:
                    User:
                      id: 12345
                      name: "sampleuser"
        "400":
          description: >-
            Malformed JSON body, unsupported operation/query document, invalid
            AniList identifier, or a propagated AniList `400` response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidJson:
                  value:
                    error: "Invalid JSON body"
                    category: "invalid_data"
                    retryable: false
                    status: 400
                    recoverySuggestions: []
                unsupportedOperation:
                  value:
                    error: "Unsupported AniList operation"
                    category: "invalid_data"
                    retryable: false
                    status: 400
                    recoverySuggestions: []
                invalidUserName:
                  value:
                    error: "Invalid AniList username"
                    category: "invalid_data"
                    retryable: false
                    status: 400
                    recoverySuggestions: []
                invalidUserId:
                  value:
                    error: "Invalid AniList userId"
                    category: "invalid_data"
                    retryable: false
                    status: 400
                    recoverySuggestions: []
                upstreamRejected:
                  value:
                    error: "HTTP error! status: 400 - Invalid query"
                    category: "invalid_data"
                    retryable: false
                    status: 400
                    recoverySuggestions: []
        "413":
          description: "JSON request body exceeded the 32768-byte AniList proxy limit"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                bodyTooLarge:
                  value:
                    error: "Request body too large"
                    category: "invalid_data"
                    retryable: false
                    status: 413
                    recoverySuggestions: []
                    maxBytes: 32768
        "401":
          $ref: "#/components/responses/UnauthorizedJson"
        "429":
          description: "Local or upstream rate limit exceeded"
          headers:
            Retry-After:
              $ref: "#/components/headers/RetryAfter"
            X-RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/RateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                simulated:
                  value:
                    error: "Rate limited (test simulation)"
                    category: "rate_limited"
                    retryable: true
                    status: 429
                    recoverySuggestions: []
                upstream:
                  value:
                    error: "HTTP error! status: 429 - Too Many Requests (Retry-After: 60)"
                    category: "rate_limited"
                    retryable: true
                    status: 429
                    recoverySuggestions: []
        "500":
          description: >-
            AniList returned a GraphQL error payload or the route hit an
            internal/server-side failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                simulated:
                  value:
                    error: "Internal server error (test simulation)"
                    category: "server_error"
                    retryable: true
                    status: 500
                    recoverySuggestions: []
                graphQlError:
                  value:
                    error: "User not found"
                upstream:
                  value:
                    error: "HTTP error! status: 500 - Internal Server Error"
        "502":
          description: "AniList transport failure before any upstream response was received"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                transportFailure:
                  value:
                    error: "AniList GraphQL request failed: Network error"
                    category: "server_error"
                    retryable: true
                    status: 502
                    recoverySuggestions: []
        "503":
          description: >-
            Missing server-side request-guard configuration, unverifiable
            client IP, or an open AniList upstream circuit breaker.
          headers:
            Retry-After:
              $ref: "#/components/headers/RetryAfter"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                missingAppOrigin:
                  value:
                    error: "Server misconfigured"
                    category: "server_error"
                    retryable: true
                    status: 503
                    recoverySuggestions: []
                missingRequestProofSecret:
                  value:
                    error: "API_SECRET_TOKEN is not configured"
                    category: "server_error"
                    retryable: true
                    status: 503
                    recoverySuggestions: []
                unverifiedClientIp:
                  value:
                    error: "Client IP could not be verified"
                    category: "server_error"
                    retryable: true
                    status: 503
                    recoverySuggestions: []
                circuitOpen:
                  value:
                    error: "AniList GraphQL circuit breaker is open (Retry-After: 30)"
                    category: "server_error"
                    retryable: true
                    status: 503
                    recoverySuggestions: []
        "504":
          description: "Timed out while waiting for AniList to respond"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                timeout:
                  value:
                    error: "AniList GraphQL request timed out after 5000ms"
                    category: "timeout"
                    retryable: true
                    status: 504
                    recoverySuggestions: []
    options:
      operationId: "preflightAniList"
      tags:
        - "anilist"
      summary: "CORS preflight for AniList proxy requests"
      description: >-
        Returns the CORS headers required for browser clients to POST approved
        AniList operations to this endpoint.
      responses:
        "200":
          $ref: "#/components/responses/JsonPostPreflight"

  /api/card:
    get:
      operationId: "renderCardSvg"
      tags:
        - "card"
      summary: "Render a stat card as SVG"
      description: >-
        Canonical Next.js route handler for AniCards SVG generation. At least one
        of `userId` or canonical `username` must be supplied. The legacy
        `userName` alias remains accepted for backward compatibility. SVG
        renders keep animations enabled unless `animate` is explicitly set to a
        false-like value. Requests with explicit visual overrides (variation,
        preset/colors, border, flags, or grid layout) use the shorter preview
        cache policy, while `_t` bypasses card-cache reads and returns no-store
        headers for that render. Public aliases also exist at `/card.svg` and
        `/api/card.svg`.
      parameters:
        - $ref: "#/components/parameters/CardUserId"
        - $ref: "#/components/parameters/CardUsername"
        - $ref: "#/components/parameters/CardUserNameDeprecated"
        - $ref: "#/components/parameters/CardType"
        - $ref: "#/components/parameters/CardVariation"
        - $ref: "#/components/parameters/CardAnimate"
        - $ref: "#/components/parameters/CardColorPreset"
        - $ref: "#/components/parameters/CardTitleColor"
        - $ref: "#/components/parameters/CardBackgroundColor"
        - $ref: "#/components/parameters/CardTextColor"
        - $ref: "#/components/parameters/CardCircleColor"
        - $ref: "#/components/parameters/CardBorderColor"
        - $ref: "#/components/parameters/CardBorderRadius"
        - $ref: "#/components/parameters/CardShowFavorites"
        - $ref: "#/components/parameters/CardStatusColors"
        - $ref: "#/components/parameters/CardPiePercentages"
        - $ref: "#/components/parameters/CardGridCols"
        - $ref: "#/components/parameters/CardGridRows"
        - $ref: "#/components/parameters/CardCacheBust"
      responses:
        "200":
          $ref: "#/components/responses/CardSvgOk"
        "400":
          $ref: "#/components/responses/CardSvgBadRequest"
        "404":
          $ref: "#/components/responses/CardSvgNotFound"
        "429":
          $ref: "#/components/responses/CardSvgRateLimited"
        "503":
          $ref: "#/components/responses/CardSvgServiceUnavailable"
        "500":
          $ref: "#/components/responses/CardSvgInternalError"
    options:
      operationId: "preflightCardSvg"
      tags:
        - "card"
      summary: "CORS preflight for SVG card rendering"
      description: >-
        Returns the embed CORS headers required for browser and third-party
        clients to fetch card SVGs from the canonical `/api/card` endpoint.
      responses:
        "200":
          $ref: "#/components/responses/CardSvgPreflight"

  /card.svg:
    get:
      operationId: "renderCardSvgAlias"
      tags:
        - "card"
      summary: "Render a stat card as SVG"
      description: >-
        Public pretty-URL alias for `/api/card`. Query parameters, response
        headers, cache behavior, and the deprecated `userName` compatibility
        alias are identical to the canonical handler.
      parameters:
        - $ref: "#/components/parameters/CardUserId"
        - $ref: "#/components/parameters/CardUsername"
        - $ref: "#/components/parameters/CardUserNameDeprecated"
        - $ref: "#/components/parameters/CardType"
        - $ref: "#/components/parameters/CardVariation"
        - $ref: "#/components/parameters/CardAnimate"
        - $ref: "#/components/parameters/CardColorPreset"
        - $ref: "#/components/parameters/CardTitleColor"
        - $ref: "#/components/parameters/CardBackgroundColor"
        - $ref: "#/components/parameters/CardTextColor"
        - $ref: "#/components/parameters/CardCircleColor"
        - $ref: "#/components/parameters/CardBorderColor"
        - $ref: "#/components/parameters/CardBorderRadius"
        - $ref: "#/components/parameters/CardShowFavorites"
        - $ref: "#/components/parameters/CardStatusColors"
        - $ref: "#/components/parameters/CardPiePercentages"
        - $ref: "#/components/parameters/CardGridCols"
        - $ref: "#/components/parameters/CardGridRows"
        - $ref: "#/components/parameters/CardCacheBust"
      responses:
        "200":
          $ref: "#/components/responses/CardSvgOk"
        "400":
          $ref: "#/components/responses/CardSvgBadRequest"
        "404":
          $ref: "#/components/responses/CardSvgNotFound"
        "429":
          $ref: "#/components/responses/CardSvgRateLimited"
        "503":
          $ref: "#/components/responses/CardSvgServiceUnavailable"
        "500":
          $ref: "#/components/responses/CardSvgInternalError"

  /api/card.svg:
    get:
      operationId: "renderCardSvgCompatibilityAlias"
      tags:
        - "card"
      summary: "Render a stat card as SVG"
      description: >-
        Compatibility alias for `/api/card`. Query parameters, response
        headers, cache behavior, and the deprecated `userName` compatibility
        alias are identical to the canonical handler.
      parameters:
        - $ref: "#/components/parameters/CardUserId"
        - $ref: "#/components/parameters/CardUsername"
        - $ref: "#/components/parameters/CardUserNameDeprecated"
        - $ref: "#/components/parameters/CardType"
        - $ref: "#/components/parameters/CardVariation"
        - $ref: "#/components/parameters/CardAnimate"
        - $ref: "#/components/parameters/CardColorPreset"
        - $ref: "#/components/parameters/CardTitleColor"
        - $ref: "#/components/parameters/CardBackgroundColor"
        - $ref: "#/components/parameters/CardTextColor"
        - $ref: "#/components/parameters/CardCircleColor"
        - $ref: "#/components/parameters/CardBorderColor"
        - $ref: "#/components/parameters/CardBorderRadius"
        - $ref: "#/components/parameters/CardShowFavorites"
        - $ref: "#/components/parameters/CardStatusColors"
        - $ref: "#/components/parameters/CardPiePercentages"
        - $ref: "#/components/parameters/CardGridCols"
        - $ref: "#/components/parameters/CardGridRows"
        - $ref: "#/components/parameters/CardCacheBust"
      responses:
        "200":
          $ref: "#/components/responses/CardSvgOk"
        "400":
          $ref: "#/components/responses/CardSvgBadRequest"
        "404":
          $ref: "#/components/responses/CardSvgNotFound"
        "429":
          $ref: "#/components/responses/CardSvgRateLimited"
        "503":
          $ref: "#/components/responses/CardSvgServiceUnavailable"
        "500":
          $ref: "#/components/responses/CardSvgInternalError"

  /card.png:
    get:
      operationId: "renderCardPng"
      tags:
        - "card"
      summary: "Render a stat card as PNG"
      description: >-
        Public raster companion to `/api/card`. It accepts the same query
        surface as the SVG routes, forwards the request through the card SVG
        handler, and converts the result to `image/png`. When `animate` is
        omitted, the route injects `animate=false` before rendering so PNGs
        default to static card markup. Explicit `animate` values are forwarded
        as-is. Successful PNG responses preserve the underlying card-render
        cache headers and `X-Cache-Source`; if rasterization fallback is
        needed, the route still returns PNG with the original status and
        no-store cache headers.
      parameters:
        - $ref: "#/components/parameters/CardUserId"
        - $ref: "#/components/parameters/CardUsername"
        - $ref: "#/components/parameters/CardUserNameDeprecated"
        - $ref: "#/components/parameters/CardType"
        - $ref: "#/components/parameters/CardVariation"
        - $ref: "#/components/parameters/CardAnimate"
        - $ref: "#/components/parameters/CardColorPreset"
        - $ref: "#/components/parameters/CardTitleColor"
        - $ref: "#/components/parameters/CardBackgroundColor"
        - $ref: "#/components/parameters/CardTextColor"
        - $ref: "#/components/parameters/CardCircleColor"
        - $ref: "#/components/parameters/CardBorderColor"
        - $ref: "#/components/parameters/CardBorderRadius"
        - $ref: "#/components/parameters/CardShowFavorites"
        - $ref: "#/components/parameters/CardStatusColors"
        - $ref: "#/components/parameters/CardPiePercentages"
        - $ref: "#/components/parameters/CardGridCols"
        - $ref: "#/components/parameters/CardGridRows"
        - $ref: "#/components/parameters/CardCacheBust"
      responses:
        "200":
          $ref: "#/components/responses/CardPngOk"
        "400":
          $ref: "#/components/responses/CardPngBadRequest"
        "404":
          $ref: "#/components/responses/CardPngNotFound"
        "429":
          $ref: "#/components/responses/CardPngRateLimited"
        "503":
          $ref: "#/components/responses/CardPngServiceUnavailable"
        "500":
          $ref: "#/components/responses/CardPngInternalError"

  /StatCards/{username}/{key}.svg:
    get:
      operationId: "renderLegacyStatCardsNotice"
      tags:
        - "card"
      summary: "Serve the legacy StatCards compatibility notice"
      description: >-
        Legacy compatibility endpoint kept alive for older StatCards embed
        URLs. The `username` and `key` path segments are preserved only so
        historical links continue to resolve; the handler ignores both values
        and returns the same cacheable static SVG notice for every request.
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
            minLength: 1
          description: >-
            Historical AniList username segment preserved for backward
            compatibility only. It does not affect the response body.
        - in: path
          name: key
          required: true
          schema:
            type: string
            minLength: 1
          description: >-
            Historical StatCards key segment preserved for backward
            compatibility only. It does not affect the response body.
      responses:
        "200":
          description: "Cacheable static SVG migration notice"
          headers:
            Cache-Control:
              description: "Browser cache policy for the notice SVG"
              schema:
                type: string
              example: "public, max-age=86400, stale-while-revalidate=604800, stale-if-error=1209600"
            CDN-Cache-Control:
              description: "Shared-cache policy for CDN intermediaries"
              schema:
                type: string
              example: "public, s-maxage=86400, stale-while-revalidate=604800, stale-if-error=1209600"
            Edge-Cache-Control:
              description: "Edge-cache policy exposed by the route"
              schema:
                type: string
              example: "public, s-maxage=86400, stale-while-revalidate=604800, stale-if-error=1209600"
          content:
            image/svg+xml:
              schema:
                type: string
              examples:
                legacyNotice:
                  summary: "Static migration prompt"
                  value: >-
                    <svg xmlns="http://www.w3.org/2000/svg" width="300" height="150"><rect width="100%" height="100%" fill="#0b1622"/><text x="50%" y="25%" dominant-baseline="middle" text-anchor="middle" fill="#3cc8ff" font-size="30" font-family="Segoe UI">AniCards Updated!</text><text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="#E8E8E8" font-size="18" font-family="Segoe UI"><tspan x="50%" dy="0">Go to anicards.alpha49.com</tspan><tspan x="50%" dy="1.2em">to regenerate statcards.</tspan></text></svg>

  /api/get-cards:
    get:
      operationId: "getStoredCards"
      tags:
        - "cards"
      summary: "Retrieve a stored cards record"
      description: >-
        Returns the persisted card configuration for a numeric AniList user ID.
        Read responses preserve already-stored legacy unsupported `cardName`
        values so older embeds remain visible until the next successful
        `/api/store-cards` write.
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: integer
            minimum: 1
          description: "Numeric AniList user ID"
      responses:
        "200":
          description: "Stored cards record"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardsRecord"
              examples:
                storedCards:
                  value:
                    userId: 12345
                    updatedAt: "2026-03-21T10:15:00.000Z"
                    globalSettings:
                      colorPreset: "custom"
                      titleColor: "#ffffff"
                      backgroundColor: "#0f172a"
                      textColor: "#e2e8f0"
                      circleColor: "#22d3ee"
                      borderEnabled: true
                      borderColor: "#334155"
                      borderRadius: 12
                    cards:
                      - cardName: "animeStats"
                        variation: "default"
                        useCustomSettings: true
                        titleColor: "#ffffff"
                        backgroundColor: "#0f172a"
                        textColor: "#e2e8f0"
                        circleColor: "#22d3ee"
                      - cardName: "mangaStats"
                        disabled: true
                      - cardName: "legacyUnsupportedCard"
                        disabled: true
        "400":
          description: "Missing or invalid user ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                missing:
                  value:
                    error: "Missing user ID parameter"
                    category: "invalid_data"
                    retryable: false
                    status: 400
                    recoverySuggestions: []
                invalid:
                  value:
                    error: "Invalid user ID format"
                    category: "invalid_data"
                    retryable: false
                    status: 400
                    recoverySuggestions: []
        "404":
          description: "No cards stored for that user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                notFound:
                  value:
                    error: "Cards not found"
                    category: "user_not_found"
                    retryable: false
                    status: 404
                    recoverySuggestions: []
        "500":
          description: "Detected stored-record corruption"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                corrupted:
                  value:
                    error: "Stored cards record is incomplete or corrupted"
                    category: "server_error"
                    retryable: false
                    status: 500
                    recoverySuggestions: []
        "503":
          description: "Card storage temporarily unavailable"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                unavailable:
                  value:
                    error: "Card data is temporarily unavailable"
                    category: "server_error"
                    retryable: true
                    status: 503
                    recoverySuggestions: []
    options:
      operationId: "preflightGetStoredCards"
      tags:
        - "cards"
      summary: "CORS preflight for stored-card lookups"
      description: >-
        Returns the CORS headers required for browser clients to fetch stored
        card configuration records.
      responses:
        "200":
          $ref: "#/components/responses/JsonGetPreflight"

  /api/get-user:
    get:
      operationId: "getStoredUser"
      tags:
        - "user"
      summary: "Retrieve a stored user record"
      description: >-
        Resolves a stored user by numeric `userId` or by normalized `username`.
        When both are provided, `userId` wins. The public response intentionally
        omits internal request metadata such as redacted IP buckets and record
        timestamps.
      parameters:
        - in: query
          name: userId
          required: false
          schema:
            type: integer
            minimum: 1
          description: "Numeric AniList user ID"
        - in: query
          name: username
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 100
          description: >-
            Username lookup key. The server trims and lowercases it before checking
            the username index. Either `userId` or `username` must be supplied.
        - in: query
          name: view
          required: false
          schema:
            type: string
            enum:
              - bootstrap
          description: >-
            Optional lightweight response mode used by the editor bootstrap flow.
            When `view=bootstrap`, the response is reduced to identity fields only.
      responses:
        "200":
          description: "Bounded public user record or lightweight bootstrap identity"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PublicUserRecord"
                  - $ref: "#/components/schemas/UserBootstrapRecord"
              examples:
                user:
                  value:
                    userId: 12345
                    username: "sampleuser"
                    stats:
                      User:
                        name: "sampleuser"
                    statistics:
                      anime:
                        count: 420
                        episodesWatched: 5200
                        meanScore: 82
                      manga:
                        count: 90
                        chaptersRead: 1800
                        meanScore: 79
                    favourites:
                      anime:
                        nodes:
                          - id: 1
                            title:
                              romaji: "Fullmetal Alchemist: Brotherhood"
                    pages:
                      followersPage:
                        pageInfo:
                          total: 12
                        followers:
                          - id: 999
